      MAP: ${cb.mapCount===0?"none":cb.mapCount===1?"–5 (–4 agile)":"–10 (–8 agile)"}${this.huntPreyId&&cb.char?"<br>Prey: "+esc((this.cbs.find(c=>c.id===this.huntPreyId)||{}).name||""):""}
      ${cb.conditions.length?"<br>"+cb.conditions.map(c=>c.c+(c.v>1?" "+c.v:"")).join(", "):""}`;
    if(cb.side!=="pc"){ bar.innerHTML=`<div class="small" style="padding:8px">${esc(cb.name)} acts…</div>`; return; }
    const B=[]; const btn=(id,label,cost,disabled,cls)=>B.push(`<button class="act-btn ${cls||""} ${this.armed&&this.armed.btn===id?"armed":""}" data-act="${id}" ${disabled?"disabled":""}>${label}${cost?` <span class="cost">${cost}</span>`:""}</button>`);
    const no=this.actions<=0;
    (cb.attacks||[]).forEach((a,i)=>{
      const mapPen=this.mapPenalty(cb,a);
      btn("strike"+i,`⚔ ${a.name}${cb.mapCount?" ("+mapPen+")":""}`,"◆",no);
    });
    btn("stride","➤ Stride","◆",no);
    btn("step","⋆ Step","◆",no);
    if(cb.char&&cb.char.build.gear.shield) btn("raise","🛡 Raise Shield","◆",no||cb.shieldRaised);
    if(cb.char){
      const ch=cb.char;
      if(ch.specials.includes("hunt-prey")) btn("hunt","🎯 Hunt Prey","◆",no);
      if(ch.skills.intimidation!=="U") btn("demoralize","😱 Demoralize","◆",no);
      if(Object.values(ch.build.feats).includes("battle-medicine")) btn("battlemed","✚ Battle Medicine","◆",no);
      if(ch.specials.includes("power-attack")) btn("powerattack","💥 Power Attack","◆◆",no||this.actions<2);
      if(ch.specials.includes("sudden-charge")) btn("charge","🐎 Sudden Charge","◆◆",no||this.actions<2);
      if(ch.specials.includes("exacting-strike")) btn("exacting","⚔ Exacting Strike","◆",no);
      if(ch.specials.includes("intimidating-strike")) btn("intstrike","⚔😱 Intimidating Strike","◆◆",no||this.actions<2);
      if(ch.specials.includes("brutish-shove")) btn("brutish","⚔🖐 Brutish Shove","◆",no);
      if(ch.specials.includes("hunted-shot")) btn("huntedshot","🏹🏹 Hunted Shot","◆",no||cb.flourishUsed||!this.huntPreyId);
      if(ch.specials.includes("twin-takedown")) btn("twintake","⚔⚔ Twin Takedown","◆",no||cb.flourishUsed||!this.huntPreyId||!cb.attacks[1]);
      if(ch.specials.includes("twin-feint")) btn("twinfeint","⚔⚔ Twin Feint","◆◆",no||this.actions<2||!cb.attacks[1]);
      if(ch.specials.includes("cackle")&&!cb.cackled&&cb.resources.focus<ch.focusMax) btn("cackle","🤣 Cackle","◇",false);
      if(ch.casting) btn("spells",`✦ Spells (R1×${cb.resources.slots[1]} R2×${cb.resources.slots[2]}${cb.resources.font?" ✚×"+cb.resources.font:""})`,"",no);
      if(ch.focusSpells.length) btn("focus",`☄ Focus (${cb.resources.focus}/${ch.focusMax})`,"",no);
      if((cb.resources.potions||0)>0) btn("potion",`🧪 Potion ×${cb.resources.potions}`,"◆",no);
    }
    if(cb.abilities) cb.abilities.forEach((ab,i)=>{ if(ab.uses>0) btn("abil"+i,`✚ ${ab.name} ×${ab.uses}`,"◆".repeat(ab.cost),no||this.actions<ab.cost); });
    btn("end","⏭ End Turn","", false,"end-turn");
    bar.innerHTML=B.join("");
    bar.querySelectorAll(".act-btn").forEach(el=>el.onclick=()=>this.actionClick(el.dataset.act));
  },
  mapPenalty(cb,a){
    if(cb.mapCount===0) return 0;
    const agile=(a.traits||[]).includes("agile");
    const flurry=cb.char&&cb.char.specials.includes("edge-flurry")&&this.huntPreyId&&this.sel&&this.sel.id===this.huntPreyId;
    const base=flurry? (agile?[0,-2,-4]:[0,-3,-6]) : (agile?[0,-4,-8]:[0,-5,-10]);
    return base[Math.min(2,cb.mapCount)];
  },

  actionClick(id){
    const cb=this.cur(); if(cb.side!=="pc") return;
    this.sel=null;
    const arm=(o,hint)=>{ this.armed={...o,btn:id}; this.hint(hint); this.renderGrid(); this.renderBar(); };
    if(id==="end") return this.endTurn();
    if(id==="stride") return arm({kind:"move",budget:this.moveBudget(cb),cost:1},"Choose a highlighted square to Stride to.");
    if(id==="step") return arm({kind:"move",budget:1,cost:1,step:true},"Step one square (no reactions).");
    if(id==="raise"){ cb.shieldRaised=true; this.spend(1); App.log(`${esc(cb.name)} raises a shield (+2 AC).`,"combat"); return this.renderAll(); }
    if(id==="hunt") return arm({kind:"target",range:99,cost:1,mode:"hunt"},"Mark a foe as your hunted prey.");
    if(id==="demoralize") return arm({kind:"target",range:6,cost:1,mode:"demoralize"},"Choose a foe within 30 ft to Demoralize.");
    if(id==="battlemed") return arm({kind:"target",range:1,cost:1,mode:"battlemed",friendly:true,canDowned:true},"Choose an adjacent ally to treat.");
    if(id.startsWith("strike")) return arm({kind:"target",range:cb.attacks[+id.slice(6)].range,cost:1,mode:"strike",atkIdx:+id.slice(6)},"Choose a target to Strike.");
    if(id==="powerattack") return arm({kind:"target",range:1,cost:2,mode:"powerattack",atkIdx:this.meleeIdx(cb)},"Power Attack: choose an adjacent foe.");
    if(id==="exacting") return arm({kind:"target",range:cb.attacks[this.meleeIdx(cb)].range,cost:1,mode:"exacting",atkIdx:this.meleeIdx(cb)},"Exacting Strike: a miss won't raise your MAP.");
    if(id==="intstrike") return arm({kind:"target",range:1,cost:2,mode:"intstrike",atkIdx:this.meleeIdx(cb)},"Intimidating Strike: choose an adjacent foe.");
    if(id==="brutish") return arm({kind:"target",range:1,cost:1,mode:"brutish",atkIdx:this.meleeIdx(cb)},"Brutish Shove.");
    if(id==="charge") return arm({kind:"move",budget:this.moveBudget(cb)*2,cost:2,charge:true},"Sudden Charge: move up to double speed, then Strike free.");
    if(id==="huntedshot") return arm({kind:"target",range:(cb.attacks.find(a=>a.ranged)||{range:12}).range,cost:1,mode:"huntedshot"},"Two shots at your prey.");
    if(id==="twintake") return arm({kind:"target",range:1,cost:1,mode:"twintake"},"Both blades on your prey.");
    if(id==="twinfeint") return arm({kind:"target",range:1,cost:2,mode:"twinfeint"},"Feint with the first, land the second.");
    if(id==="cackle"){ cb.cackled=true; cb.resources.focus=Math.min(cb.char.focusMax,cb.resources.focus+1);
      App.log(`${esc(cb.name)} <b>cackles</b>, and the patron leans closer. (+1 focus)`,"combat"); return this.renderAll(); }
    if(id==="potion") return arm({kind:"target",range:1,cost:1,mode:"potion",friendly:true,canDowned:true},"Drink or administer: choose yourself or an adjacent ally.");
    if(id==="spells") return this.spellMenu(cb,false);
    if(id==="focus") return this.spellMenu(cb,true);
    if(id.startsWith("abil")) { const ab=cb.abilities[+id.slice(4)];
      return arm({kind:"target",range:ab.range,cost:ab.cost,mode:"companion-abil",abil:ab,friendly:ab.type==="heal",canDowned:true},ab.flavor||ab.name); }
  },
  meleeIdx(cb){ const i=cb.attacks.findIndex(a=>!a.ranged); return i<0?0:i; },
  moveBudget(cb){ let s=cb.speed||Math.floor((cb.char?cb.char.speed:25)/5);
    if(this.condVal(cb,"gripped")) s=Math.max(1,s-1);
    return s; },
  spend(n){ this.actions-=n; },

  cellClick(x,y){
    const a=this.armed; if(!a) return;
    const cb=this.cur();
    if(a.kind==="move"){
      const reach=this.reachable(cb,a.budget); const k=this.key(x,y);
      if(!reach[k]||this.occupied(x,y)) return;
      this.doMove(cb,x,y,reach,a);
    } else if(a.kind==="cell"){
      if(Math.max(Math.abs(x-cb.x),Math.abs(y-cb.y))>a.range) return;
      this.castAt(cb,a,{x,y});
    }
  },
  tokenClick(t){
    const a=this.armed; if(!a){ App.toast(`${t.name}: HP ${t.hp}/${t.hpMax} · AC ${t.ac}`); return; }
    const cb=this.cur();
    if(a.kind==="target"){
      if(!this.targets(a).includes(t)) return;
      this.sel=t;
      this.resolveTargeted(cb,a,t);
    } else if(a.kind==="cell"){ this.cellClick(t.x,t.y); }
  },
  doMove(cb,x,y,reach,a){
    // provoke reactive strikes when leaving reach of enemy fighters (foes only trigger PC fighters)
    const path=[]; let k=this.key(x,y);
    while(k){ const [px,py]=k.split(",").map(Number); path.unshift({x:px,y:py}); k=reach[k].prev; }
    if(!a.step) this.provokeAlong(cb,path);
    cb.x=x; cb.y=y;
    this.spend(a.cost); this.armed=null; this.hint("");
    if(a.charge){ this.armed={kind:"target",range:1,cost:0,mode:"strike",atkIdx:this.meleeIdx(cb),btn:"charge2"};
      this.hint("Now Strike an adjacent foe (free)."); }
    this.renderAll();
  },
  provokeAlong(mover,path){
    if(mover.side!=="foe") return;
    const fighters=this.alive("pc").filter(p=>p.char&&p.char.specials.includes("reactive-strike")&&!p.reactionUsed&&p.dying===0);
    for(const f of fighters){
      for(let i=1;i<path.length;i++){
        if(this.dist(f,path[i-1])<=1&&this.dist(f,path[i])>1){
          f.reactionUsed=true;
          App.log(`<b>Reactive Strike!</b> ${esc(f.name)} lashes out as ${esc(mover.name)} moves.`,"combat");
          this.strike(f,mover,f.attacks[this.meleeIdx(f)],{noMAP:true});
          break;
        }
      }
      if(mover.dead) break;
    }
  },

  resolveTargeted(cb,a,t){
    const done=(cost)=>{ this.spend(cost!==undefined?cost:a.cost); this.armed=null; this.sel=null; this.hint(""); this.renderAll(); this.checkEnd(); };
    switch(a.mode){
      case "hunt": this.huntPreyId=t.id; App.log(`${esc(cb.name)} <b>Hunts Prey</b>: ${esc(t.name)}.`,"combat"); return done();
      case "demoralize": {
        const ch=cb.char; let mod=skillMod(ch,"intimidation")-this.condVal(cb,"frightened")-this.condVal(cb,"sickened");
        if(!ch.specials.includes("intimidating-glare")) mod-=4; // no shared language with the mindless dead
        const dc=10+(t.saves.will||0)+CHAR_LEVEL;
        const r=App.rollCheck(`${cb.name} Demoralizes ${t.name}`,mod,dc);
        if(r.deg>=2){ this.addCond(t,"frightened",r.deg===3?2:1);
          if(r.deg===3&&ch.specials.includes("terrified-retreat")&&(t.monster&&t.monster.level<CHAR_LEVEL)) this.addCond(t,"fleeing",1,1); }
        t.demoralized=true; return done();
      }
      case "battlemed": {
        const ch=cb.char;
        const r=App.rollCheck(`${cb.name}: Battle Medicine on ${t.name}`,skillMod(ch,ch.specials.includes("natural-medicine")&&ch.skills.nature!=="U"?"nature":"medicine"),15);
        if(r.deg>=2) this.heal(t,Dice.roll(r.deg===3?"2d8+10":"2d8").total);
        else if(r.deg===0) this.applyDamage(t,Dice.roll("1d8").total,"slashing",null,"botched surgery");
        return done();
      }
      case "potion": { cb.resources.potions--; const h=Dice.roll("1d8").total;
        this.heal(t,h); App.log(`${esc(t.name)} drinks a healing potion (+${h}).`,"combat"); return done(); }
      case "strike": this.strike(cb,t,cb.attacks[a.atkIdx]); return done(a.btn==="charge2"?0:1);
      case "exacting": this.strike(cb,t,cb.attacks[a.atkIdx],{exacting:true}); return done();
      case "powerattack": { cb.mapCount++; this.strike(cb,t,cb.attacks[a.atkIdx],{extraDie:1}); return done(); }
      case "intstrike": { const hit=this.strike(cb,t,cb.attacks[a.atkIdx]);
        if(hit>=2) this.addCond(t,"frightened",hit===3?2:1); return done(); }
      case "brutish": { const hit=this.strike(cb,t,cb.attacks[a.atkIdx]);
        if(hit>=2){ t.offGuardUntil=this.round; this.addCond(t,"clumsy",1,1,true); App.log(`${esc(t.name)} is knocked off-balance (off-guard).`,"combat"); } return done(); }
      case "huntedshot": { if(t.id!==this.huntPreyId){ this.hint("Hunted Shot only works on your prey."); return; }
        cb.flourishUsed=true; const w=cb.attacks.find(x=>x.ranged);
        this.strike(cb,t,w); if(!t.dead) this.strike(cb,t,w); return done(); }
      case "twintake": { if(t.id!==this.huntPreyId){ this.hint("Twin Takedown only works on your prey."); return; }
        cb.flourishUsed=true; this.strike(cb,t,cb.attacks[0]); if(!t.dead) this.strike(cb,t,cb.attacks[1]); return done(); }
      case "twinfeint": { this.strike(cb,t,cb.attacks[0]); if(!t.dead) this.strike(cb,t,cb.attacks[1],{forceOffGuard:true}); return done(); }
      case "companion-abil": { const ab=a.abil;
        if(ab.type==="heal"){ ab.uses--; const h=Dice.roll(ab.heal).total; this.heal(t,h);
          App.log(`${esc(cb.name)}: <b>${ab.name}</b> — ${esc(t.name)} regains ${h} HP. <i>${esc(ab.flavor||"")}</i>`,"combat"); }
        return done(); }
      case "spell-target": return this.castAt(cb,a,t);
    }
  },

  /* ---------- strikes ---------- */
  strike(att,def,wpn,opts){
    opts=opts||{};
    const mapPen=opts.noMAP?0:(()=>{ const saveSel=this.sel; this.sel=def; const p=this.mapPenalty(att,wpn); this.sel=saveSel; return p; })();
    let mod=this.atkMod(att,wpn)+mapPen;
    const {ac,offGuard}=this.effAC(def,{...att,ranged:wpn.ranged},{forceOffGuard:opts.forceOffGuard||def.offGuardUntil===this.round});
    const fortune=att.buffs.some(b=>b.fortune);
    let d20=Dice.d(20);
    if(fortune){ const d2=Dice.d(20); d20=Math.max(d20,d2); att.buffs=att.buffs.filter(b=>!b.fortune); }
    // blur on defender
    if(def.buffs.some(b=>b.flag==="blurred")){ if(Dice.d(20)<=4){ App.log(`The blur swallows the blow — a clean miss.`,"combat"); if(!opts.exacting&&!opts.noMAP) att.mapCount++; return 1; } }
    const total=d20+mod;
    const deg=Dice.degree(d20,total,ac);
    App.rollSeal(`${att.name}: ${wpn.name} vs ${def.name}${offGuard?" (off-guard)":""}`,d20,`${d20}${mod>=0?"+":""}${mod} = ${total} vs AC ${ac}`,deg);
    if(!opts.noMAP&&!(opts.exacting&&deg<2)) att.mapCount++;
    if(deg>=2){
      let dice=wpn.die; const extra=opts.extraDie||0;
      let dmg=Dice.roll(dice).total+(extra?Dice.roll(dice).total:0)+ (wpn.dmgMod||0)+(wpn.statusDmg||0);
      dmg+=this.buffSum(att,"damage");
      if(!wpn.ranged&&this.condVal(att,"enfeebled")) dmg=Math.max(1,dmg-this.condVal(att,"enfeebled"));
      // precision: sneak attack / precision edge / companion sneak
      let precision=0;
      const sneaky=(att.char&&att.char.specials.includes("sneak-attack"))||wpn.sneak;
      const qualifies=wpn.ranged||(wpn.traits||[]).includes("agile")||(wpn.traits||[]).includes("finesse")||(att.char&&att.char.specials.includes("racket-ruffian"));
      if(sneaky&&offGuard&&qualifies) precision+=Dice.roll(wpn.sneak||"1d6").total;
      if(att.char&&att.char.specials.includes("edge-precision")&&this.huntPreyId===def.id&&!att.precisionUsedRound){ precision+=Dice.roll("1d8").total; att.precisionUsedRound=this.round; }
      dmg+=precision;
      // runic weapon bonus die
      att.buffs.forEach(b=>(b.bonuses||[]).forEach(x=>{ if(x.target==="bonus-die") dmg+=Dice.roll(x.value).total; }));
      if(deg===3){ dmg*=2;
        const deadly=(wpn.traits||[]).find(t=>t.startsWith("deadly"));
        if(deadly) dmg+=Dice.roll("1"+deadly.split("-")[1]).total;
        (wpn.onCrit||[]).forEach(c=>this.addCond(def,c.c,c.v,c.dur));
      }
      this.applyDamage(def,dmg,wpn.damageType,att);
      if(precision) App.log(`(${precision} precision damage within.)`,"combat");
    }
    return deg;
  },

  /* ---------- spells ---------- */
  spellMenu(cb,focusOnly){
    const ch=cb.char, res=cb.resources;
    const rows=[];
    const add=(sp,label,rank,pool)=>rows.push({sp,label,rank,pool});
    if(focusOnly){
      ch.focusSpells.forEach(id=>{ const sp=Registry.spells[id]; if(!sp) return;
        const cost=sp.hex?0:1;
        add(sp,`${sp.name} ${sp.hex?"(hex — free, 1/turn)":"(1 focus)"}`,Math.ceil(CHAR_LEVEL/2),"focus"); });
    } else {
      ch.casting.cantrips.forEach(id=>{ const sp=Registry.spells[id]; if(sp) add(sp,`${sp.name} (cantrip)`,Math.ceil(CHAR_LEVEL/2),"cantrip"); });
      const list1=ch.casting.type==="spontaneous"? ch.casting.r1 : ch.casting.r1;
      list1.forEach(id=>{ const sp=Registry.spells[id]; if(sp) add(sp,`${sp.name} (rank 1)`,1,"r1"); });
      ch.casting.r2.forEach(id=>{ const sp=Registry.spells[id]; if(sp) add(sp,`${sp.name} (rank 2)`,2,"r2"); });
      if(res.font>0) add(Registry.spells.heal,`Heal — Divine Font (rank 2)`,2,"font");
    }
    const body=rows.map((r,i)=>{
      const spent = r.pool==="r1"? res.slots[1]<=0 : r.pool==="r2"? res.slots[2]<=0 : r.pool==="focus"? (!r.sp.hex&&res.focus<=0) : r.pool==="font"? res.font<=0 : false;
      const hexBlocked=r.sp.hex&&cb.hexUsed;
      return `<div class="opt-card ${spent||hexBlocked?"disabled":""}" data-i="${i}">
        <h3>${r.label}</h3><div class="meta">${"◆".repeat(Math.min(3,r.sp.actions||2))} · ${r.sp.range?r.sp.range+" ft":(r.sp.area?r.sp.area.shape:"self")}${r.sp.save?" · "+cap3(r.sp.save)+" save":r.sp.attackRoll?" · spell attack":""}</div>
        <div class="desc">${r.sp.desc}</div></div>`;}).join("");
    App.modal("Cast a Spell",`<div class="card-grid">${body}</div>`,[{label:"Cancel"}]);
    document.querySelectorAll("#modal-body .opt-card:not(.disabled)").forEach(el=>el.onclick=()=>{
      const r=rows[+el.dataset.i]; App.closeModal(); this.armSpell(cb,r);
    });
  },
  armSpell(cb,r){
    const sp=r.sp; const cost=Math.min(3,sp.actions||2);
    if(cost>this.actions){ App.toast("Not enough actions."); return; }
    const a={kind:null,btn:"spell",mode:"spell-target",spell:sp,castRank:r.rank,pool:r.pool,cost};
    const rangeCells=Math.floor((sp.range||0)/5);
    if(sp.area&&sp.area.shape==="burst"){ a.kind="cell"; a.range=Math.max(1,rangeCells)||6; a.radius=Math.floor(sp.area.radius/5); }
    else if(sp.area&&(sp.area.shape==="cone"||sp.area.shape==="line")){ a.kind="cell"; a.range=Math.floor(sp.area.length/5); a.wedge=sp.area.shape; }
    else if(sp.area&&sp.area.shape==="emanation"){ this.armed=a; return this.castAt(cb,a,{x:cb.x,y:cb.y}); }
    else if(sp.partyBuff||sp.selfBuff){ this.armed=a; return this.castAt(cb,a,cb); }
    else { a.kind="target"; a.range=Math.max(1,rangeCells);
      a.friendly=!!(sp.heal||sp.allyBuff||sp.rankEffects[r.rank]&&sp.rankEffects[r.rank].heal||sp.special==="stabilize"||Object.values(sp.rankEffects)[0].heal);
      a.canDowned=true;
      if(sp.healOrHarmUndead) a.friendly=true; }
    this.armed=a; this.hint(`Casting ${sp.name} — choose ${a.kind==="cell"?"a point":"a target"}.`);
    this.renderGrid(); this.renderBar();
  },
  spendSpell(cb,a){
    const res=cb.resources;
    if(a.pool==="r1") res.slots[1]--;
    else if(a.pool==="r2") res.slots[2]--;
    else if(a.pool==="font") res.font--;
    else if(a.pool==="focus"&&!a.spell.hex) res.focus--;
    if(a.spell.hex) cb.hexUsed=true;
  },
  effectFor(sp,rank){
    const keys=Object.keys(sp.rankEffects).map(Number).filter(k=>k<=rank).sort((a,b)=>b-a);
    return sp.rankEffects[keys[0]]||sp.rankEffects[Object.keys(sp.rankEffects)[0]]||{};
  },
  castAt(cb,a,target){
    const sp=a.spell, eff=this.effectFor(sp,a.castRank);
    this.spendSpell(cb,a);
    this.spend(a.cost);
    App.log(`${esc(cb.name)} casts <b>${sp.name}</b>.`,"combat");
    const dc=cb.char.casting? cb.char.casting.dc : 10;
    const spellAtk=cb.char.casting? cb.char.casting.attack : 0;
    let victims=[];
    if(a.kind==="cell"){
      if(a.wedge==="line"){
        // all cells along Bresenham to target
        let x0=cb.x,y0=cb.y; const x1=target.x,y1=target.y;
        const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1; let err=dx-dy;
        const cells=[];
        while(!(x0===x1&&y0===y1)&&cells.length<=a.range){
          const e2=2*err; if(e2>-dy){err-=dy;x0+=sx;} if(e2<dx){err+=dx;y0+=sy;}
          cells.push({x:x0,y:y0});
        }
        victims=this.cbs.filter(c=>!c.dead&&c.side!==cb.side&&cells.some(p=>p.x===c.x&&p.y===c.y));
      } else if(a.wedge==="cone"){
        const dirx=Math.sign(target.x-cb.x), diry=Math.sign(target.y-cb.y);
        victims=this.cbs.filter(c=>{ if(c.dead||c.side===cb.side) return false;
          const rx=c.x-cb.x, ry=c.y-cb.y;
          if(Math.max(Math.abs(rx),Math.abs(ry))>a.range||((rx===0)&&(ry===0))) return false;
          const okx=dirx===0||Math.sign(rx)===dirx||rx===0;
          const oky=diry===0||Math.sign(ry)===diry||ry===0;
          return okx&&oky&&Math.abs(Math.abs(rx)-Math.abs(ry))<=Math.max(Math.abs(rx),Math.abs(ry));
        });
      } else { // burst
        victims=this.cbs.filter(c=>!c.dead&&Math.max(Math.abs(c.x-target.x),Math.abs(c.y-target.y))<=a.radius);
        if(!sp.friendlyFire) victims=victims.filter(c=>c.side!==cb.side);
      }
    } else if(sp.area&&sp.area.shape==="emanation"){
      const rad=Math.floor(sp.area.radius/5);
      victims=this.cbs.filter(c=>!c.dead&&c!==cb&&c.side!==cb.side&&this.dist(c,cb)<=rad);
    } else victims=[target];

    // Multi-target attack spells (electric arc style handled via save; blazing bolt & needle etc single unless maxTargets)
    if(sp.maxTargets&&a.kind==="target"){
      const extra=this.cbs.filter(c=>c!==target&&!c.dead&&c.side!==cb.side&&this.dist(cb,c)<=a.range&&this.losClear(cb,c))
        .sort((x,y)=>this.dist(cb,x)-this.dist(cb,y)).slice(0,sp.maxTargets-1);
      victims=[target,...extra];
      if(extra.length) App.log(`The spell arcs to ${extra.map(e=>esc(e.name)).join(", ")} as well.`,"combat");
    }

    victims.forEach(t=>{
      // Healing / friendly effects
      if(eff.heal||sp.healOrHarmUndead){
        const isUndead=t.monster&&(t.monster.traits||[]).includes("undead");
        if(sp.healOrHarmUndead&&isUndead){
          const dmg=Dice.roll(eff.heal).total;
          const save=this.rollSave(t,"fortitude",dc,sp.name);
          const mult=[2,1,0.5,0][save];
          this.applyDamage(t,Math.floor(dmg*mult),"vitality",cb,sp.name);
        } else if(eff.heal){
          let formula=eff.heal;
          if(cb.char.specials.includes("healing-hands")&&sp.id==="heal") formula=formula.replace(/d8/g,"d10");
          const h=Dice.roll(formula).total; this.heal(t,h);
          App.log(`${esc(t.name)} regains ${h} HP.`,"combat");
        }
        if(eff.tempHP){ t.tempHP=Math.max(t.tempHP||0,eff.tempHP); }
        return;
      }
      if(sp.special==="stabilize"){ if(t.dying>0){ t.dying=0; t.hp=Math.max(t.hp,0); App.log(`${esc(t.name)} is stabilized.`,"combat"); } return; }
      // Attack roll spells
      if(sp.attackRoll){
        const {ac}=this.effAC(t,{ranged:true});
        const d20=Dice.d(20), total=d20+spellAtk;
        const deg=Dice.degree(d20,total,ac);
        App.rollSeal(`${sp.name} vs ${t.name}`,d20,`${d20}+${spellAtk} = ${total} vs AC ${ac}`,deg);
        if(deg>=2){ let dmg=(eff.damage||[]).reduce((s,d)=>s+Dice.roll(d.formula).total,0);
          if(cb.char.specials.includes("burn-it")&&(sp.traits||[]).includes("fire")) dmg+=1;
          if(deg===3){ dmg*=2; if(eff.critPersistent) t.conditions.push({c:"persistent",formula:eff.critPersistent.formula,dtype:eff.critPersistent.type,dur:99}); }
          (eff.damage||[]).length&&this.applyDamage(t,dmg,eff.damage[0].type,cb,sp.name);
        }
        cb.mapCount++; // attack trait
        return;
      }
      // Auto-hit
      if(sp.autoHit){ const dmg=(eff.damage||[]).reduce((s,d)=>s+Dice.roll(d.formula).total,0);
        this.applyDamage(t,dmg,eff.damage[0].type,cb,sp.name); return; }
      // Save spells
      if(sp.save){
        if(sp.livingOnly&&t.monster&&(t.monster.traits||[]).includes("undead")){
          if(sp.healsUndead){ const h=Dice.roll((eff.damage||[{formula:"1d8"}])[0].formula).total; t.hp=Math.min(t.hpMax,t.hp+h); App.log(`${esc(t.name)} drinks the void and knits together (+${h}).`,"combat"); }
          else App.log(`${esc(t.name)} has no life to drain.`,"combat");
          return; }
        const deg=this.rollSave(t,sp.save,dc,sp.name);
        if(sp.basic&&eff.damage){
          let dmg=eff.damage.reduce((s,d)=>s+Dice.roll(d.formula).total,0);
          if(cb.char.specials.includes("burn-it")&&(sp.traits||[]).includes("fire")) dmg+=1;
          const mult=[2,1,0.5,0][deg];
          if(mult>0) this.applyDamage(t,Math.floor(dmg*mult),eff.damage[0].type,cb,sp.name);
          else App.log(`${esc(t.name)} evades entirely.`,"combat");
        }
        const bucket= deg===0? eff.onCritFail||eff.onFail : deg===1? eff.onFail : deg===2? eff.onSuccess:null;
        (bucket||[]).forEach(c=>this.addCond(t,c.c==="bane"?"bane":c.c,c.v,c.dur));
        if(eff.persistent&&deg<=1) t.conditions.push({c:"persistent",formula:eff.persistent.formula,dtype:eff.persistent.type,dur:99});
        return;
      }
      // Buffs
      if(sp.partyBuff){
        const allies=this.cbs.filter(c=>c.side===cb.side&&!c.dead&&c.dying===0);
        allies.forEach(al=>al.buffs.push({name:sp.name,bonuses:sp.partyBuff.bonuses,duration:sp.partyBuff.duration+ (al===cb?1:1)}));
        App.log(`${sp.name} lifts the whole line (+1 for ${sp.partyBuff.duration} round${sp.partyBuff.duration>1?"s":""}).`,"combat"); return;
      }
      if(sp.selfBuff){
        const sb=sp.selfBuff;
        if(sb.tempHP){ cb.tempHP=Math.max(cb.tempHP||0,sb.tempHP); App.log(`${esc(cb.name)} gains ${sb.tempHP} temporary HP.`,"combat"); }
        if(sb.fortune) cb.buffs.push({name:sp.name,fortune:true});
        if(sb.bonus) cb.buffs.push({name:sp.name,bonuses:[sb.bonus],duration:sb.duration||1});
        if(sb.grantStrike){ const g=sb.grantStrike;
          cb.attacks=[{name:g.name,bonus:cb.attacks[0].bonus,die:g.damage,dmgMod:cb.char.abil.str+g.statusDmg,damageType:g.damageType,traits:g.traits,range:1,ranged:false},...cb.attacks.filter(x=>x.name!==g.name)];
          App.log(`${esc(cb.name)}'s hands crack into ${g.name.toLowerCase()}s!`,"combat"); }
        return;
      }
      if(sp.allyBuff){
        const ab=sp.allyBuff;
        if(ab.fortune) t.buffs.push({name:sp.name,fortune:true});
        if(ab.bonus) t.buffs.push({name:sp.name,bonuses:[{...ab.bonus,target:ab.bonus.target==="next-check"?"attack":ab.bonus.target}],duration:ab.duration||1});
        if(ab.bonuses) t.buffs.push({name:sp.name,bonuses:ab.bonuses,duration:ab.duration||3});
        if(ab.flag) t.buffs.push({name:sp.name,flag:ab.flag,duration:ab.duration||10});
        if(ab.resistChoice){ t.resistances=[...(t.resistances||[]),{type:"fire",value:ab.resistChoice},{type:"cold",value:ab.resistChoice},{type:"electricity",value:ab.resistChoice},{type:"acid",value:ab.resistChoice},{type:"sonic",value:ab.resistChoice}];
          App.log(`${esc(t.name)} is warded against the elements (resist 5).`,"combat"); }
        else App.log(`${esc(t.name)} is bolstered by ${sp.name}.`,"combat");
        return;
      }
    });
    this.armed=null; this.sel=null; this.hint("");
    this.renderAll(); this.checkEnd();
  },
  rollSave(t,save,dc,label){
    const mod=this.saveMod(t,save);
    let d20=Dice.d(20);
    if(t.buffs&&t.buffs.some(b=>b.fortune)){ d20=Math.max(d20,Dice.d(20)); t.buffs=t.buffs.filter(b=>!b.fortune); }
    const total=d20+mod;
    const deg=Dice.degree(d20,total,dc);
    App.rollSeal(`${t.name}: ${cap(save)} save vs ${label}`,d20,`${d20}${mod>=0?"+":""}${mod} = ${total} vs DC ${dc}`,deg);
    return deg;
  },

  /* ---------- enemy AI ---------- */
  aiTurn(foe){
    if(!this.active||foe.dead){ return this.nextTurn(); }
    const step=()=>{
      if(!this.active||foe.dead||this.actions<=0){ if(this.active&&!foe.dead) this.endTurn(); return; }
      if(this.checkEnd()) return;
      const pcs=this.alive("pc").filter(p=>p.dying===0);
      if(!pcs.length){ this.endTurn(); return; }
      if(this.condVal(foe,"fleeing")){ // run from nearest
        const near=pcs.sort((a,b)=>this.dist(foe,a)-this.dist(foe,b))[0];
        const reach=this.reachable(foe,this.moveBudget(foe));
        let best=null,bd=-1;
        Object.keys(reach).forEach(k=>{ const [x,y]=k.split(",").map(Number);
          if(this.occupied(x,y)&&!(x===foe.x&&y===foe.y)) return;
          const d=Math.max(Math.abs(x-near.x),Math.abs(y-near.y));
          if(d>bd){bd=d;best={x,y};} });
        if(best){ foe.x=best.x; foe.y=best.y; }
        App.log(`${esc(foe.name)} flees in terror!`,"combat");
        this.spend(this.actions); this.renderAll(); return setTimeout(step,450);
      }
      // power?
      const pw=(foe.powers||[]).find(p=>p.cd<=0&&p.cost<=this.actions);
      if(pw){ const inRad=pcs.filter(p=>this.dist(foe,p)<=pw.radius);
        if(inRad.length>=Math.min(2,pcs.length)){
          App.log(`<b>${esc(foe.name)}: ${pw.name}!</b> <i>${esc(pw.flavor||"")}</i>`,"combat");
          inRad.forEach(t=>{
            const deg=this.rollSave(t,pw.save,pw.dc,pw.name);
            const mult=[2,1,0.5,0][deg];
            if(mult>0) this.applyDamage(t,Math.floor(Dice.roll(pw.damage).total*mult),pw.damageType,foe,pw.name);
            const bucket=deg===0?pw.onCritFail||pw.onFail:deg===1?pw.onFail:null;
            (bucket||[]).forEach(c=>this.addCond(t,c.c,c.v,c.dur));
          });
          pw.cd=pw.cooldown; this.spend(pw.cost); this.renderAll(); return setTimeout(step,600);
        } }
      // target: nearest (prefer downed? no — nearest standing, prefer lowest HP among adjacent)
      const adjacent=pcs.filter(p=>this.dist(foe,p)<=1);
      if(adjacent.length){
        const t=adjacent.sort((a,b)=>a.hp-b.hp)[0];
        if(foe.mapCount>=2){ this.spend(this.actions); return setTimeout(step,300); }
        const atk=foe.attacks[foe.mapCount%foe.attacks.length]||foe.attacks[0];
        const atkObj={...atk,traits:atk.traits||[],die:atk.damage,dmgMod:0,range:atk.range,ranged:atk.range>1,statusDmg:0};
        this.strikeMonster(foe,t,atkObj);
        this.spend(1); this.renderAll(); return setTimeout(step,550);
      }
      // ranged?
      const ranged=foe.attacks.find(a=>a.range>1);
      const seen=pcs.filter(p=>this.losClear(foe,p));
      if(ranged&&seen.length&&foe.mapCount<2){
        const t=seen.sort((a,b)=>this.dist(foe,a)-this.dist(foe,b))[0];
        if(this.dist(foe,t)<=ranged.range){
          this.strikeMonster(foe,t,{...ranged,traits:ranged.traits||[],die:ranged.damage,dmgMod:0,ranged:true,statusDmg:0});
          this.spend(1); this.renderAll(); return setTimeout(step,550);
        }
      }
      // move toward nearest
      const near=pcs.sort((a,b)=>this.dist(foe,a)-this.dist(foe,b))[0];
      const reach=this.reachable(foe,this.moveBudget(foe));
      let best=null,bd=1e9;
      Object.keys(reach).forEach(k=>{ const [x,y]=k.split(",").map(Number);
        if(this.occupied(x,y)&&!(x===foe.x&&y===foe.y)) return;
        const d=Math.max(Math.abs(x-near.x),Math.abs(y-near.y));
        if(d<bd||(d===bd&&reach[k].cost<((best&&reach[this.key(best.x,best.y)].cost)||1e9))){bd=d;best={x,y};} });
      if(best&&!(best.x===foe.x&&best.y===foe.y)){
        const path=[]; let k=this.key(best.x,best.y);
        while(k){ const [px,py]=k.split(",").map(Number); path.unshift({x:px,y:py}); k=reach[k].prev; }
        this.provokeAlong(foe,path);
        if(!foe.dead){ foe.x=best.x; foe.y=best.y; }
        this.spend(1); this.renderAll(); return setTimeout(step,450);
      }
      this.spend(this.actions); setTimeout(step,300);
    };
    step();
  },
  strikeMonster(foe,t,atk){
    let mod=atk.bonus - this.condVal(foe,"frightened")-this.condVal(foe,"sickened")-this.condVal(foe,"enfeebled")-this.condVal(foe,"hexed")-this.condVal(foe,"night-shrouded");
    mod+= foe.mapCount===0?0: (atk.traits.includes("agile")? (foe.mapCount===1?-4:-8):(foe.mapCount===1?-5:-10));
    foe.mapCount++;
    const {ac,offGuard}=this.effAC(t,{ranged:atk.ranged});
    // nimble dodge
    let acFinal=ac;
    if(t.char&&t.char.specials.includes("nimble-dodge")&&!t.nimbleUsed&&!t.reactionUsed){ acFinal+=2; t.nimbleUsed=true; t.reactionUsed=true;
      App.log(`${esc(t.name)} <b>Nimbly Dodges</b> (+2 AC).`,"combat"); }
    const d20=Dice.d(20), total=d20+mod;
    const deg=Dice.degree(d20,total,acFinal);
    App.rollSeal(`${foe.name}: ${atk.name} vs ${t.name}`,d20,`${d20}+${mod} = ${total} vs AC ${acFinal}`,deg);
    if(deg>=2){
      let dmg=Dice.roll(atk.die).total;
      if(deg===3){ dmg*=2; (atk.onCrit||[]).forEach(c=>this.addCond(t,c.c,c.v,c.dur)); }
      this.applyDamage(t,dmg,atk.damageType,foe);
      if(atk.sneak&&offGuard) this.applyDamage(t,Dice.roll(atk.sneak).total,atk.damageType,foe);
    }
  }
};
/* ============================================================
   APP SHELL: title, scenes, chronicle, saves, pack loading
   ============================================================ */
const App = {
  hero:null, heroCb:null, companions:[], adv:null, sceneId:null, flags:{}, chronicle:[],
  fileMode:null, dailyLuckUsed:false,

  init(){
    try{ Registry.loadPack(CORE_PACK); Registry.loadPack(ADVENTURE_PACK); }
    catch(e){ alert(e.message); }
    document.getElementById("btn-new-hero").onclick=()=>Builder.open();
    document.getElementById("btn-begin-adv").onclick=()=>this.chooseAdventure();
    document.getElementById("btn-view-hero").onclick=()=>this.modal("Hero Sheet",`<div class="parchment" style="padding:16px 20px">${sheetHTML(this.hero,true)}</div>`,[{label:"Close"}]);
    document.getElementById("btn-resume").onclick=()=>this.resume();
    document.getElementById("btn-to-title").onclick=()=>this.toTitle();
    document.getElementById("btn-load-content").onclick=()=>{ this.fileMode="content"; document.getElementById("file-input").click(); };
    document.getElementById("btn-export-save").onclick=()=>this.exportSave();
    document.getElementById("btn-import-save").onclick=()=>{ this.fileMode="save"; document.getElementById("file-input").click(); };
    document.getElementById("file-input").onchange=(e)=>this.fileChosen(e);
    this.refreshTitle();
    try{ if(localStorage.getItem("torchbearer-save")) document.getElementById("btn-resume").disabled=false; }catch(e){}
  },
  show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById("screen-"+id).classList.add("active"); },
  toTitle(){ if(Combat.active&&!confirm("Abandon the current battle and return to the title?")) return;
    Combat.active=false; this.show("title"); this.refreshTitle(); },
  refreshTitle(){
    document.getElementById("btn-begin-adv").disabled=!this.hero;
    document.getElementById("btn-view-hero").disabled=!this.hero;
    const pl=document.getElementById("pack-list");
    pl.innerHTML="Loaded content: "+Registry.packs.map(p=>`<span class="pk">${esc(p.name)} <span class="small">v${esc(p.version||"1")}</span></span>`).join("")
      +`<div class="small" style="margin-top:6px">Load new ancestries, classes, feats, spells, monsters, or whole adventures with <b>Load Content JSON</b> above. See the Content Authoring Guide.</div>`;
  },
  toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block";
    clearTimeout(this._tt); this._tt=setTimeout(()=>t.style.display="none",2600); },
  modal(title,body,buttons){
    document.getElementById("modal-title").innerHTML=title;
    document.getElementById("modal-body").innerHTML=body;
    const foot=document.getElementById("modal-foot");
    foot.innerHTML=(buttons||[{label:"Close"}]).map((b,i)=>`<button class="nav-btn" data-i="${i}">${b.label}</button>`).join("");
    foot.querySelectorAll("button").forEach(el=>el.onclick=()=>{ const b=buttons[+el.dataset.i]; this.closeModal(); if(b.fn) b.fn(); });
    document.getElementById("modal-veil").classList.add("open");
  },
  closeModal(){ document.getElementById("modal-veil").classList.remove("open"); },

  /* ---------- chronicle & dice ---------- */
  log(html,cls){ this.chronicle.push({html,cls});
    const c=document.getElementById("chronicle"); if(!c) return;
    const d=document.createElement("div"); d.className="chron-entry "+(cls||""); d.innerHTML=html;
    c.appendChild(d); c.scrollTop=c.scrollHeight; },
  redrawChronicle(){ const c=document.getElementById("chronicle"); if(!c) return;
    c.innerHTML=this.chronicle.map(e=>`<div class="chron-entry ${e.cls||""}">${e.html}</div>`).join(""); c.scrollTop=c.scrollHeight; },
  rollSeal(title,d20,math,deg){
    const sealCls=d20===20||deg===3?"crit":d20===1||deg===0?"fumble":"";
    const html=`<div class="seal ${sealCls}">${d20}</div><div class="roll-detail">
      <div class="rd-title">${esc(title)}</div><div class="rd-math">${esc(math)}</div>
      <div class="rd-out ${DEG_CLASS[deg]}">${DEG_NAME[deg]}</div></div>`;
    this.chronicle.push({html,cls:"roll"});
    const c=document.getElementById("chronicle");
    if(c){ const d=document.createElement("div"); d.className="chron-entry roll"; d.innerHTML=html; c.appendChild(d); c.scrollTop=c.scrollHeight; }
    this.diceFlash(d20,deg);
    return deg;
  },
  diceFlash(n,deg){
    const o=document.getElementById("dice-overlay"), num=document.getElementById("big-d20-num");
    num.textContent=n;
    num.style.background= n===20?"radial-gradient(circle at 35% 30%, #C79A4B, #7A5518 75%)": n===1?"radial-gradient(circle at 35% 30%, #3A3A3E, #17171B 75%)":"";
    o.classList.remove("rolling"); void o.offsetWidth; o.classList.add("rolling");
    clearTimeout(this._dt); this._dt=setTimeout(()=>o.classList.remove("rolling"),900);
  },
  rollCheck(title,mod,dc){
    const d20=Dice.d(20), total=d20+mod;
    const deg=Dice.degree(d20,total,dc);
    this.rollSeal(title,d20,`${d20}${mod>=0?"+":""}${mod} = ${total} vs DC ${dc}`,deg);
    return {d20,total,deg};
  },

  /* ---------- party & combatants ---------- */
  heroCombatant(){
    const ch=this.hero;
    if(this.heroCb&&this.heroCb.char===ch) return this.heroCb;
    this.heroCb={id:"hero",side:"pc",name:ch.name,char:ch,hpMax:ch.hpMax,hp:ch.hpMax,tempHP:0,ac:ch.ac,
      saves:{fort:ch.saves.fort,ref:ch.saves.ref,will:ch.saves.will},perception:ch.perception,
      speed:Math.floor(ch.speed/5),attacks:ch.attacks.map(a=>({...a})),conditions:[],buffs:[],dying:0,wounded:0,
      resources:{slots:ch.casting?{1:ch.casting.slots[1],2:ch.casting.slots[2]}:{1:0,2:0},
        focus:ch.focusMax,font:ch.casting&&ch.casting.font?ch.casting.font.uses:0,
        potions:(ch.consumables.find(c=>c.id==="healing-potion-minor")||{count:0}).count}};
    return this.heroCb;
  },
  companionCombatant(id){
    const c=Registry.companions[id];
    return {id:"comp-"+id,side:"pc",name:c.name,subtitle:c.subtitle,hpMax:c.hp,hp:c.hp,tempHP:0,ac:c.ac,
      saves:{...c.saves},perception:c.perception,initSkill:c.initSkill,speed:Math.floor(c.speed/5),
      attacks:c.attacks.map(a=>({...a,die:a.damage,dmgMod:0,traits:a.traits||[],ranged:a.range>1})),
      abilities:(c.abilities||[]).map(a=>({...a})),conditions:[],buffs:[],dying:0,wounded:0,resources:{slots:{1:0,2:0},focus:0,font:0,potions:0}};
  },
  party(){ return [this.heroCombatant(),...this.companions]; },

  /* ---------- adventure flow ---------- */
  chooseAdventure(){
    const advs=Registry.list(Registry.adventures);
    const body=advs.map(a=>`<div class="opt-card" data-id="${a.id}"><h3>${esc(a.name)}</h3>
      <div class="meta">Level ${a.level} adventure</div><div class="desc">${esc(a.blurb||"")}</div></div>`).join("");
    this.modal("Choose an Adventure",`<div class="card-grid">${body}</div>
      <div class="small" style="margin-top:10px;font-style:italic">More adventures can be loaded from JSON on the title screen.</div>`,[{label:"Cancel"}]);
    document.querySelectorAll("#modal-body .opt-card").forEach(el=>el.onclick=()=>{ this.closeModal(); this.startAdventure(el.dataset.id); });
  },
  startAdventure(id){
    this.adv=Registry.adventures[id];
    this.flags={}; this.companions=[]; this.heroCb=null; this.dailyLuckUsed=false;
    this.chronicle=[];
    this.show("game");
    this.log(`<b>${esc(this.adv.name)}</b> — the chronicle of ${esc(this.hero.name)} begins.`,"narr");
    this.gotoScene(this.adv.start);
  },
  setCenter(html){ document.getElementById("game-center").innerHTML=html; },
  renderGameChrome(){ this.renderParty(); this.redrawChronicle(); },
  renderParty(){
    const el=document.getElementById("game-left"); if(!el) return;
    const cur=Combat.active? Combat.cur():null;
    el.innerHTML=this.party().map(cb=>{
      const pct=Math.round(100*cb.hp/cb.hpMax);
      return `<div class="pc-card ${cur===cb?"active-turn":""}">
      <div class="pc-name">${esc(cb.name)}</div>
      <div class="pc-sub">${esc(cb.char? `${cb.char.heritage||cb.char.ancestry} ${cb.char.className} ${cb.char.level} · AC ${cb.ac}`:(cb.subtitle||"")+" · AC "+cb.ac)}</div>
      <div class="hp-bar"><div class="hp-fill" style="width:${pct}%"></div><div class="hp-txt">${cb.hp} / ${cb.hpMax}${cb.tempHP?" +"+cb.tempHP:""}</div></div>
      <div class="cond-row">${cb.dying?`<span class="cond-chip">DYING ${cb.dying}</span>`:""}
        ${cb.conditions.map(c=>`<span class="cond-chip">${c.c}${c.v>1?" "+c.v:""}</span>`).join("")}
        ${cb.buffs.filter(b=>b.name).map(b=>`<span class="cond-chip buff">${b.name}</span>`).join("")}</div>
      ${cb.char&&cb.char.casting?`<div class="small" style="margin-top:5px">Slots R1×${cb.resources.slots[1]} R2×${cb.resources.slots[2]}${cb.resources.font?" · font ×"+cb.resources.font:""}${cb.char.focusMax?" · focus "+cb.resources.focus+"/"+cb.char.focusMax:""}</div>`:
        cb.char&&cb.char.focusMax?`<div class="small" style="margin-top:5px">Focus ${cb.resources.focus}/${cb.char.focusMax}</div>`:""}
      </div>`;
    }).join("");
  },
  gotoScene(id){
    if(id==="END"){ this.toTitle(); return; }
    const sc=this.adv.scenes[id];
    if(!sc){ this.toast("Missing scene: "+id); return; }
    this.sceneId=id;
    // onEnter
    if(sc.onEnter){
      if(sc.onEnter.flag) this.flags[sc.onEnter.flag]=true;
      (sc.onEnter.items||[]).forEach(it=>{
        const hero=this.heroCombatant();
        if(it.startsWith("healing-potion")) hero.resources.potions++;
        this.log(`Gained: <b>${esc((Registry.items[it]||{name:it}).name)}</b>.`,"narr");
      });
    }
    this.renderGameChrome();
    const choiceHTML=(sc.choices||[]).map((c,i)=>{
      if(c.if&&!this.flagOk(c.if)) return "";
      if(c.once&&this.flags[c.flagOnce]) return "";
      const cls=c.combat?"ch-combat":"";
      let sub="";
      if(c.check){ const alt=c.check.altSkill? ` or ${cap(c.check.altSkill)}`:"";
        sub=`<span class="ch-check">◆ ${cap(c.check.skill)}${alt} check · DC ${c.check.dc}</span>`; }
      if(c.combat) sub=`<span class="ch-check" style="color:var(--ember-hi)">◆ ${esc(c.combatLabel||"Battle")}</span>`;
      return `<button class="choice-btn ${cls}" data-i="${i}">${esc(c.text)}${sub}</button>`;
    }).join("");
    this.setCenter(`<div id="scene-stage"><div class="scene-page">
      <div class="scene-kicker">${esc(sc.kicker||"")}</div>
      <h1 class="scene-title">${esc(sc.title)}</h1>
      <div class="scene-text">${sc.text.map(p=>`<p>${p}</p>`).join("")}</div>
      ${sc.companionChoice? this.companionPickerHTML():""}
      <div class="choice-list">${choiceHTML}</div>
      ${sc.ending?`<div class="rule"></div><div class="small" style="text-align:center;font-style:italic">— end of chronicle —</div>`:""}
    </div></div>`);
    if(sc.companionChoice) this.bindCompanionPicker();
    document.querySelectorAll(".choice-btn").forEach(el=>el.onclick=()=>this.choose(sc,+el.dataset.i));
    if(!sc.gameover) this.autosave();
  },
  flagOk(expr){ return expr.startsWith("!")? !this.flags[expr.slice(1)] : !!this.flags[expr]; },
  companionPickerHTML(){
    const offered=(this.adv.companionsOffered||[]);
    return `<div class="section-sub" style="margin-top:18px">Traveling Companions</div>
      <div class="small" style="margin-bottom:8px">Choose who walks the moor with you. (Encounters scale to your party's size.)</div>
      <div class="card-grid">${offered.map(id=>{ const c=Registry.companions[id];
        const sel=this.companions.some(x=>x.id==="comp-"+id);
        return `<div class="opt-card ${sel?"selected":""}" data-comp="${id}"><h3>${esc(c.name)}</h3>
          <div class="meta">${esc(c.subtitle)} · AC ${c.ac} · HP ${c.hp}</div><div class="desc">${esc(c.desc)}</div></div>`; }).join("")}</div>`;
  },
  bindCompanionPicker(){
    document.querySelectorAll("[data-comp]").forEach(el=>el.onclick=()=>{
      const id=el.dataset.comp;
      const i=this.companions.findIndex(x=>x.id==="comp-"+id);
      if(i>=0) this.companions.splice(i,1);
      else this.companions.push(this.companionCombatant(id));
      this.gotoScene(this.sceneId);
    });
  },
  choose(sc,i){
    const c=sc.choices[i];
    if(c.flagOnce) this.flags[c.flagOnce]=true;
    if(c.combat){
      this.log(`<i>${esc(c.text)}</i>`,"narr");
      Combat.start(c.combat,this.adv,{onVictory:()=>this.gotoScene(c.victory),onDefeat:()=>this.gotoScene(c.defeat||"gameover")});
      return;
    }
    if(c.check){
      const ch=this.hero;
      let skill=c.check.skill;
      if(c.check.altSkill&&skillMod(ch,c.check.altSkill)>skillMod(ch,skill)) skill=c.check.altSkill;
      let mod=skill==="perception"?ch.perception:skillMod(ch,skill);
      let r=this.rollCheck(`${ch.name}: ${cap(skill)} check`,mod,c.check.dc);
      if(r.deg<=1&&ch.specials.includes("halfling-luck")&&!this.dailyLuckUsed){
        this.dailyLuckUsed=true;
        this.log(`<b>Halfling Luck!</b> ${esc(ch.name)} rerolls with a grin.`,"narr");
        r=this.rollCheck(`${ch.name}: ${cap(skill)} (lucky reroll)`,mod,c.check.dc);
      }
      this.log(`<i>${esc(c.text)}</i>`,"narr");
      this.gotoScene(r.deg>=2? c.check.success:c.check.failure);
      return;
    }
    this.log(`<i>${esc(c.text)}</i>`,"narr");
    this.gotoScene(c.goto);
  },
  resume(){
    try{ const raw=localStorage.getItem("torchbearer-save");
      if(raw) this.loadSave(JSON.parse(raw)); }
    catch(e){ this.toast("No resumable journey found."); }
  },

  /* ---------- save / load ---------- */
  snapshot(){
    return {v:1, build:this.hero?this.hero.build:null,
      advId:this.adv?this.adv.id:null, sceneId:this.sceneId, flags:this.flags,
      dailyLuckUsed:this.dailyLuckUsed,
      hero: this.heroCb? {hp:this.heroCb.hp,wounded:this.heroCb.wounded,resources:this.heroCb.resources}:null,
      companions:this.companions.map(c=>({id:c.id.replace("comp-",""),hp:c.hp})),
      chronicle:this.chronicle.slice(-80)};
  },
  autosave(){ try{ localStorage.setItem("torchbearer-save",JSON.stringify(this.snapshot())); }catch(e){} },
  exportSave(){
    if(!this.hero){ this.toast("Nothing to save yet — forge a hero first."); return; }
    const blob=new Blob([JSON.stringify(this.snapshot(),null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=(this.hero.name||"hero").replace(/\W+/g,"-").toLowerCase()+".torchsave.json"; a.click();
    this.toast("Save exported.");
  },
  loadSave(s){
    if(!s||!s.build){ this.toast("That file isn't a Torchbearer save."); return; }
    try{
      this.hero=finalizeCharacter(s.build);
      this.heroCb=null; this.chronicle=s.chronicle||[];
      if(s.hero){ const cb=this.heroCombatant(); cb.hp=Math.min(cb.hpMax,s.hero.hp); cb.wounded=s.hero.wounded||0;
        if(s.hero.resources) cb.resources=s.hero.resources; }
      this.flags=s.flags||{}; this.dailyLuckUsed=!!s.dailyLuckUsed;
      this.companions=(s.companions||[]).map(c=>{ const cb=this.companionCombatant(c.id); cb.hp=Math.min(cb.hpMax,c.hp); return cb; });
      if(s.advId&&Registry.adventures[s.advId]&&s.sceneId){
        this.adv=Registry.adventures[s.advId]; this.show("game"); this.gotoScene(s.sceneId);
      } else { this.toTitle(); }
      this.toast("Journey restored: "+this.hero.name);
    }catch(e){ this.toast("Save could not be restored: "+e.message); }
  },
  fileChosen(e){
    const f=e.target.files[0]; e.target.value="";
    if(!f) return;
    const reader=new FileReader();
    reader.onload=()=>{
      let data; try{ data=JSON.parse(reader.result); }
      catch(err){ this.modal("Invalid JSON",`<p>That file couldn't be parsed as JSON:</p><p class="small">${esc(err.message)}</p>`,[{label:"Close"}]); return; }
      if(this.fileMode==="save"){ this.loadSave(data); return; }
      try{ const meta=Registry.loadPack(data);
        this.refreshTitle();
        this.modal("Content Loaded",`<p><b>${esc(meta.name)}</b> v${esc(meta.version||"1")} loaded successfully.</p>
          <p class="small">${esc(meta.description||"")}</p>
          <p class="small">Added: ${["ancestries","backgrounds","classes","feats","spells","items","monsters","companions","adventures"].map(k=>data[k]?data[k].length+" "+k:null).filter(Boolean).join(", ")||"nothing (empty pack)"}.</p>`,[{label:"Splendid"}]);
      }catch(err){ this.modal("Content Rejected",`<p>The pack failed validation:</p><pre class="small" style="white-space:pre-wrap">${esc(err.message)}</pre>
        <p class="small">See the Content Authoring Guide for the schema.</p>`,[{label:"Close"}]); }
    };
    reader.readAsText(f);
  }
};
window.addEventListener("DOMContentLoaded",()=>App.init());
</script></body></html>
