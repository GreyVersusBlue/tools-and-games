<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torchbearer — A Pathfinder 2e Adventure Engine</title>
<style>
:root{
  --soot:#17130E; --leather:#241C12; --leather2:#2D2416; --raised:#372C1B;
  --parch:#EADCB8; --parch-dim:#C9B98F; --ink:#2A2015; --faded:#A8977B;
  --brass:#C79A4B; --brass-hi:#E8C270; --ember:#A5402D; --ember-hi:#D06A50;
  --verdigris:#5E9C8F; --verdigris-hi:#8CC7BA;
  --good:#7FA657; --bad:#C05B45;
  --serif-display:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;
  --serif-body:Georgia,'Times New Roman',serif;
  --mono:ui-monospace,'Cascadia Mono',Consolas,Menlo,monospace;
  --line:#4A3A22;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--soot);
  background-image:
    radial-gradient(ellipse 90% 60% at 50% -10%, rgba(199,154,75,.07), transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 110%, rgba(165,64,45,.05), transparent 60%);
  color:var(--parch); font-family:var(--serif-body); font-size:15px; line-height:1.5;
  overflow:hidden;
}
h1,h2,h3,h4{font-family:var(--serif-display);font-variant:small-caps;letter-spacing:.06em;font-weight:600;color:var(--brass-hi)}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--leather)}
::-webkit-scrollbar-thumb{background:var(--raised);border-radius:5px;border:2px solid var(--leather)}
::-webkit-scrollbar-thumb:hover{background:var(--line)}

/* ============ APP FRAME ============ */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{
  display:flex;align-items:center;gap:14px;padding:8px 16px;
  background:linear-gradient(180deg,var(--leather2),var(--leather));
  border-bottom:2px solid var(--line);flex:0 0 auto;
}
#topbar .brand{font-family:var(--serif-display);font-variant:small-caps;letter-spacing:.12em;font-size:20px;color:var(--brass-hi);text-shadow:0 1px 0 #000}
#topbar .brand .flame{color:var(--ember-hi)}
#topbar .sub{color:var(--faded);font-size:12px;font-style:italic}
#topbar .spacer{flex:1}
.tb-btn{
  background:var(--raised);color:var(--parch);border:1px solid var(--line);
  padding:5px 12px;border-radius:3px;font-size:12.5px;font-variant:small-caps;letter-spacing:.05em;
  font-family:var(--serif-display);
}
.tb-btn:hover{background:var(--line);color:var(--brass-hi)}
#main{flex:1;display:flex;min-height:0}

/* ============ GENERIC PANELS ============ */
.panel{background:var(--leather);border:1px solid var(--line);border-radius:4px}
.parchment{
  background:var(--parch);color:var(--ink);border-radius:3px;
  box-shadow:inset 0 0 40px rgba(120,90,40,.25), 0 3px 10px rgba(0,0,0,.5);
}
.parchment h1,.parchment h2,.parchment h3{color:#5C3A16}
.parchment .sheet-name{color:#4A2E12}
.parchment .sheet-line .v{color:#3A2A14}
.parchment .sheet-line .k{color:#7A6440}
.parchment .sheet-block-title{color:#8A5A1E;border-color:#C9B173}
.parchment .small{color:#6B5738}
.parchment .sheet-line{border-color:rgba(120,90,40,.35)}
.rule{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:10px 0}
.small{font-size:12px;color:var(--faded)}
.brass-text{color:var(--brass-hi)}
.ember-text{color:var(--ember-hi)}

/* ============ SCREENS ============ */
.screen{flex:1;display:none;min-height:0}
.screen.active{display:flex}

/* ---- Title screen ---- */
#screen-title{flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:20px;overflow-y:auto}
#screen-title .sigil{width:130px;height:130px;filter:drop-shadow(0 0 24px rgba(199,154,75,.35))}
#screen-title h1{font-size:46px;letter-spacing:.16em;text-shadow:0 2px 8px #000}
#screen-title .tagline{color:var(--faded);font-style:italic;max-width:520px}
.title-menu{display:flex;flex-direction:column;gap:10px;width:320px;margin-top:8px}
.title-btn{
  background:linear-gradient(180deg,var(--raised),var(--leather2));
  border:1px solid var(--brass);color:var(--parch);
  font-family:var(--serif-display);font-variant:small-caps;letter-spacing:.1em;font-size:17px;
  padding:11px;border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,.5);
  transition:all .15s;
}
.title-btn:hover:not(:disabled){border-color:var(--brass-hi);color:var(--brass-hi);box-shadow:0 0 14px rgba(199,154,75,.25)}
.title-btn:disabled{opacity:.4;cursor:default}
.title-btn.primary{border-color:var(--ember);background:linear-gradient(180deg,#4A2A1C,#33201A)}
.title-btn.primary:hover{border-color:var(--ember-hi);color:var(--ember-hi);box-shadow:0 0 14px rgba(165,64,45,.35)}
#pack-list{font-size:12px;color:var(--faded);max-width:480px}
#pack-list .pk{display:inline-block;margin:2px 4px;padding:2px 8px;border:1px solid var(--line);border-radius:10px;background:var(--leather)}

/* ---- Builder ---- */
#screen-builder{flex-direction:row}
#builder-steps{
  flex:0 0 200px;background:var(--leather);border-right:2px solid var(--line);
  display:flex;flex-direction:column;padding:14px 0;overflow-y:auto;
}
.bstep{
  padding:9px 16px;color:var(--faded);font-family:var(--serif-display);font-variant:small-caps;
  letter-spacing:.06em;font-size:14px;border-left:3px solid transparent;cursor:pointer;
  display:flex;align-items:center;gap:8px;
}
.bstep .st-num{font-family:var(--mono);font-size:10px;border:1px solid var(--line);border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.bstep:hover{color:var(--parch)}
.bstep.current{color:var(--brass-hi);border-left-color:var(--brass);background:rgba(199,154,75,.06)}
.bstep.done{color:var(--parch)}
.bstep.done .st-num{background:var(--brass);color:var(--ink);border-color:var(--brass)}
.bstep.locked{opacity:.35;cursor:default}
#builder-center{flex:1;display:flex;flex-direction:column;min-width:0}
#builder-body{flex:1;overflow-y:auto;padding:18px 22px}
#builder-footer{flex:0 0 auto;display:flex;gap:10px;padding:10px 22px;border-top:1px solid var(--line);background:var(--leather)}
#builder-footer .spacer{flex:1}
.nav-btn{
  background:var(--raised);border:1px solid var(--brass);color:var(--parch);
  font-family:var(--serif-display);font-variant:small-caps;letter-spacing:.08em;font-size:15px;
  padding:8px 22px;border-radius:3px;
}
.nav-btn:hover:not(:disabled){color:var(--brass-hi);border-color:var(--brass-hi)}
.nav-btn:disabled{opacity:.35;cursor:default}
#builder-sheet{
  flex:0 0 290px;border-left:2px solid var(--line);background:var(--leather);
  overflow-y:auto;padding:14px;
}
.step-title{font-size:24px;margin-bottom:2px}
.step-hint{color:var(--faded);font-style:italic;font-size:13px;margin-bottom:14px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px}
.opt-card{
  background:var(--leather2);border:1px solid var(--line);border-radius:4px;padding:11px 13px;
  cursor:pointer;transition:all .12s;position:relative;
}
.opt-card:hover{border-color:var(--brass);background:var(--raised)}
.opt-card.selected{border-color:var(--brass-hi);background:var(--raised);box-shadow:0 0 10px rgba(199,154,75,.2), inset 0 0 0 1px var(--brass)}
.opt-card.selected::after{content:"✦";position:absolute;top:7px;right:9px;color:var(--brass-hi)}
.opt-card.disabled{opacity:.4;cursor:default}
.opt-card.disabled:hover{border-color:var(--line);background:var(--leather2)}
.opt-card h3{font-size:16.5px;margin-bottom:2px}
.opt-card .meta{font-size:11px;color:var(--verdigris-hi);font-family:var(--mono);letter-spacing:.02em;margin-bottom:5px}
.opt-card .desc{font-size:12.5px;color:var(--parch-dim);line-height:1.45}
.opt-card .tagrow{margin-top:6px}
.tag{display:inline-block;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:2px;background:var(--soot);color:var(--faded);border:1px solid var(--line);margin-right:4px;text-transform:uppercase;letter-spacing:.04em}
.tag.t-trait{color:var(--ember-hi);border-color:#5A3226}
.section-sub{margin-top:20px;margin-bottom:8px;font-size:17px;border-bottom:1px solid var(--line);padding-bottom:4px}

/* boosts */
.boost-row{display:flex;align-items:center;gap:8px;margin:7px 0;flex-wrap:wrap}
.boost-label{flex:0 0 200px;font-family:var(--serif-display);font-variant:small-caps;color:var(--parch)}
.boost-choice{display:flex;gap:6px;flex-wrap:wrap}
.abil-chip{
  border:1px solid var(--line);background:var(--leather2);color:var(--parch);
  font-family:var(--mono);font-size:12px;padding:4px 10px;border-radius:3px;text-transform:uppercase;
}
.abil-chip:hover:not(:disabled){border-color:var(--brass)}
.abil-chip.picked{background:var(--brass);color:var(--ink);border-color:var(--brass-hi);font-weight:bold}
.abil-chip:disabled{opacity:.35;cursor:default}
.abil-summary{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
.abil-box{
  flex:1;min-width:80px;text-align:center;background:var(--leather2);border:1px solid var(--line);
  border-radius:4px;padding:8px 4px;
}
.abil-box .an{font-variant:small-caps;font-family:var(--serif-display);color:var(--faded);font-size:12px}
.abil-box .av{font-family:var(--mono);font-size:22px;color:var(--brass-hi)}
.abil-box.key{border-color:var(--brass)}
.abil-box .amod{font-family:var(--mono);font-size:11px;color:var(--verdigris-hi)}

/* skills */
.skill-row{display:flex;align-items:center;gap:10px;padding:5px 8px;border-bottom:1px solid rgba(74,58,34,.4)}
.skill-row .sk-name{flex:0 0 150px;font-family:var(--serif-display);font-variant:small-caps}
.skill-row .sk-mod{font-family:var(--mono);color:var(--verdigris-hi);flex:0 0 40px;text-align:right}
.prof-pip{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:2px;border:1px solid var(--line);color:var(--faded)}
.prof-pip.T{color:var(--verdigris-hi);border-color:var(--verdigris)}
.prof-pip.E{color:var(--brass-hi);border-color:var(--brass)}
.prof-pip.fixed{opacity:.8}
.sk-pick{margin-left:auto}
.pick-btn{background:var(--leather2);border:1px solid var(--line);color:var(--parch);font-size:11px;padding:3px 10px;border-radius:3px;font-variant:small-caps;font-family:var(--serif-display);letter-spacing:.05em}
.pick-btn:hover:not(:disabled){border-color:var(--brass)}
.pick-btn.picked{background:var(--brass);color:var(--ink);border-color:var(--brass-hi)}
.pick-btn:disabled{opacity:.3;cursor:default}
.counter-pill{display:inline-block;background:var(--soot);border:1px solid var(--line);padding:3px 12px;border-radius:12px;font-family:var(--mono);font-size:12px;color:var(--brass-hi);margin-bottom:10px}

/* sheet preview */
#builder-sheet h2{font-size:18px;text-align:center}
.sheet-name{font-size:20px;text-align:center;color:var(--parch);font-family:var(--serif-display)}
.sheet-line{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 2px;border-bottom:1px dotted rgba(74,58,34,.5)}
.sheet-line .k{color:var(--faded);font-variant:small-caps;font-family:var(--serif-display)}
.sheet-line .v{color:var(--parch);font-family:var(--mono);font-size:12px;text-align:right}
.sheet-block-title{font-size:13px;margin-top:12px;color:var(--brass);border-bottom:1px solid var(--line)}
input[type=text].name-input{
  width:100%;background:var(--soot);border:1px solid var(--line);color:var(--parch);
  font-family:var(--serif-display);font-size:20px;padding:8px 12px;border-radius:3px;letter-spacing:.03em;
}
input[type=text].name-input:focus{outline:none;border-color:var(--brass)}

/* ---- Adventure / scene screen ---- */
#screen-game{flex-direction:row}
#game-left{flex:0 0 250px;background:var(--leather);border-right:2px solid var(--line);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
#game-center{flex:1;display:flex;flex-direction:column;min-width:0}
#game-right{flex:0 0 300px;background:var(--leather);border-left:2px solid var(--line);display:flex;flex-direction:column;min-height:0}

.pc-card{background:var(--leather2);border:1px solid var(--line);border-radius:4px;padding:10px}
.pc-card.active-turn{border-color:var(--brass-hi);box-shadow:0 0 10px rgba(199,154,75,.25)}
.pc-card .pc-name{font-family:var(--serif-display);font-variant:small-caps;font-size:16px;color:var(--brass-hi)}
.pc-card .pc-sub{font-size:11px;color:var(--faded);margin-bottom:6px}
.hp-bar{height:14px;background:var(--soot);border:1px solid var(--line);border-radius:7px;overflow:hidden;position:relative}
.hp-bar .hp-fill{height:100%;background:linear-gradient(180deg,#8F3A2A,#6E2A1E);transition:width .4s}
.hp-bar .hp-txt{position:absolute;inset:0;text-align:center;font-family:var(--mono);font-size:10px;line-height:13px;color:var(--parch);text-shadow:0 1px 2px #000}
.cond-row{margin-top:5px;min-height:16px}
.cond-chip{display:inline-block;font-size:10px;font-family:var(--mono);background:#3A2018;border:1px solid var(--ember);color:var(--ember-hi);border-radius:2px;padding:1px 5px;margin:1px 2px;text-transform:uppercase;letter-spacing:.03em}
.cond-chip.buff{background:#1E3230;border-color:var(--verdigris);color:var(--verdigris-hi)}

#scene-stage{flex:1;overflow-y:auto;padding:24px;display:flex;justify-content:center}
.scene-page{max-width:680px;width:100%}
.scene-art{width:100%;border-radius:4px;border:1px solid var(--line);margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.scene-title{font-size:30px;text-shadow:0 2px 6px #000;margin-bottom:4px}
.scene-kicker{color:var(--ember-hi);font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px}
.scene-text{font-size:16.5px;line-height:1.7;color:var(--parch)}
.scene-text p{margin-bottom:14px}
.scene-text p:first-of-type::first-letter{
  font-family:var(--serif-display);font-size:52px;float:left;line-height:.85;
  padding:4px 8px 0 0;color:var(--ember-hi);text-shadow:0 2px 4px #000;
}
.scene-text em{color:var(--parch-dim)}
.choice-list{display:flex;flex-direction:column;gap:9px;margin-top:22px}
.choice-btn{
  text-align:left;background:linear-gradient(180deg,var(--leather2),var(--leather));
  border:1px solid var(--line);border-left:3px solid var(--brass);
  color:var(--parch);padding:11px 15px;border-radius:3px;font-family:var(--serif-body);font-size:15px;
  transition:all .12s;
}
.choice-btn:hover:not(:disabled){border-color:var(--brass-hi);border-left-color:var(--brass-hi);background:var(--raised);transform:translateX(3px)}
.choice-btn:disabled{opacity:.4;cursor:default}
.choice-btn .ch-check{color:var(--verdigris-hi);font-family:var(--mono);font-size:11px;display:block;margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.choice-btn.ch-combat{border-left-color:var(--ember)}
.choice-btn.ch-combat:hover{border-left-color:var(--ember-hi)}

/* ---- Chronicle (signature) ---- */
#chronicle-head{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
#chronicle-head h2{font-size:16px}
#chronicle{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.chron-entry{font-size:13px;color:var(--parch-dim);line-height:1.5;border-left:2px solid var(--line);padding-left:10px;animation:chronIn .35s ease}
.chron-entry.narr{color:var(--faded);font-style:italic}
.chron-entry.roll{display:flex;gap:10px;align-items:flex-start;border-left-color:var(--brass)}
.chron-entry.combat{border-left-color:var(--ember)}
.chron-entry b{color:var(--parch)}
@keyframes chronIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.seal{
  flex:0 0 44px;width:44px;height:44px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:bold;font-size:17px;
  background:radial-gradient(circle at 35% 30%, #8E3D2C, #5E2418 70%);
  box-shadow:inset 0 2px 4px rgba(255,255,255,.15), inset 0 -3px 5px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.6);
  color:#F2D9A0;text-shadow:0 1px 2px #000;
  animation:sealStamp .4s cubic-bezier(.2,1.6,.4,1);
}
.seal::before{content:"";position:absolute;inset:4px;border-radius:50%;border:1px dashed rgba(242,217,160,.4)}
.seal.crit{background:radial-gradient(circle at 35% 30%, #C79A4B, #7A5518 70%);color:#FFF3D0}
.seal.fumble{background:radial-gradient(circle at 35% 30%, #3A3A3E, #1C1C20 70%);color:#9AA}
@keyframes sealStamp{0%{transform:scale(2.2);opacity:0}60%{transform:scale(.92);opacity:1}100%{transform:scale(1)}}
.roll-detail{flex:1}
.roll-detail .rd-title{font-family:var(--serif-display);font-variant:small-caps;font-size:13px;color:var(--brass-hi)}
.roll-detail .rd-math{font-family:var(--mono);font-size:11px;color:var(--faded)}
.roll-detail .rd-out{font-size:12px}
.rd-out.crit-success{color:var(--brass-hi);font-weight:bold}
.rd-out.success{color:var(--good)}
.rd-out.failure{color:var(--bad)}
.rd-out.crit-failure{color:#8A8A92;font-weight:bold}

/* ---- Combat ---- */
#combat-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
#combat-top{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:8px 14px;background:var(--leather);border-bottom:1px solid var(--line)}
#initiative-tracker{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.init-chip{
  display:flex;align-items:center;gap:6px;background:var(--leather2);border:1px solid var(--line);
  border-radius:3px;padding:3px 9px;font-size:12px;font-family:var(--serif-display);font-variant:small-caps;
}
.init-chip .in{font-family:var(--mono);color:var(--verdigris-hi);font-size:11px}
.init-chip.turn{border-color:var(--brass-hi);background:var(--raised);box-shadow:0 0 8px rgba(199,154,75,.3)}
.init-chip.foe{color:var(--ember-hi)}
.init-chip.dead{opacity:.35;text-decoration:line-through}
#grid-scroll{flex:1;overflow:auto;display:flex;align-items:safe center;justify-content:safe center;padding:16px;background:
  radial-gradient(ellipse at center, rgba(199,154,75,.04), transparent 70%)}
#grid{position:relative;box-shadow:0 6px 30px rgba(0,0,0,.65);border:2px solid var(--line)}
.cell{position:absolute;width:46px;height:46px;border:1px solid rgba(74,58,34,.35)}
.cell.floor{background:#3A3128}
.cell.floor.alt{background:#372E26}
.cell.wall{background:#181410;border-color:#0E0B08;box-shadow:inset 0 0 8px #000}
.cell.diff{background:#33352A}
.cell.hl-move{background:rgba(94,156,143,.28);cursor:pointer;box-shadow:inset 0 0 0 1px rgba(140,199,186,.5)}
.cell.hl-move:hover{background:rgba(94,156,143,.5)}
.cell.hl-target{background:rgba(165,64,45,.3);cursor:crosshair;box-shadow:inset 0 0 0 1px rgba(208,106,80,.6)}
.cell.hl-target:hover{background:rgba(165,64,45,.55)}
.cell.hl-aoe{background:rgba(199,154,75,.3);box-shadow:inset 0 0 0 1px rgba(232,194,112,.55)}
.token{
  position:absolute;width:40px;height:40px;margin:3px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif-display);font-weight:bold;font-size:16px;
  border:2px solid;cursor:pointer;transition:left .25s,top .25s;
  text-shadow:0 1px 2px #000;z-index:5;
}
.token.pc{background:radial-gradient(circle at 35% 30%,#3E6259,#22423C);border-color:var(--verdigris-hi);color:#DFF3EC}
.token.foe{background:radial-gradient(circle at 35% 30%,#7E352A,#4C1E16);border-color:var(--ember-hi);color:#F5D9CE}
.token.turn-glow{box-shadow:0 0 0 3px rgba(199,154,75,.55),0 0 16px rgba(199,154,75,.5)}
.token.dead{opacity:.25;filter:grayscale(1);cursor:default}
.token .mini-hp{position:absolute;bottom:-6px;left:4px;right:4px;height:4px;background:#000;border-radius:2px;overflow:hidden}
.token .mini-hp i{display:block;height:100%;background:var(--good)}
.token.selected-target{box-shadow:0 0 0 3px var(--ember-hi),0 0 14px rgba(208,106,80,.6)}
#combat-bottom{flex:0 0 auto;background:var(--leather);border-top:2px solid var(--line);padding:10px 14px;display:flex;gap:14px;align-items:flex-start;min-height:118px}
#action-pips{display:flex;gap:5px;align-items:center}
.pip{width:22px;height:22px;transform:rotate(45deg);background:var(--brass);border:1px solid var(--brass-hi);border-radius:3px;transition:all .2s}
.pip.spent{background:var(--soot);border-color:var(--line)}
#action-bar{display:flex;gap:7px;flex-wrap:wrap;flex:1}
.act-btn{
  background:var(--leather2);border:1px solid var(--line);color:var(--parch);
  padding:7px 12px;border-radius:3px;font-size:13px;font-family:var(--serif-display);
  font-variant:small-caps;letter-spacing:.04em;display:flex;align-items:center;gap:6px;
}
.act-btn:hover:not(:disabled){border-color:var(--brass);color:var(--brass-hi)}
.act-btn:disabled{opacity:.35;cursor:default}
.act-btn.armed{background:var(--raised);border-color:var(--brass-hi);color:var(--brass-hi);box-shadow:0 0 8px rgba(199,154,75,.25)}
.act-btn .cost{font-family:var(--mono);font-size:10px;color:var(--ember-hi)}
.act-btn.end-turn{border-color:var(--ember);color:var(--ember-hi)}
#combat-status{flex:0 0 230px;font-size:12px;color:var(--faded)}
#combat-status b{color:var(--parch)}
.map-hint{font-size:11.5px;color:var(--verdigris-hi);font-style:italic;margin-top:4px;min-height:16px}

/* ---- Modals ---- */
#modal-veil{position:fixed;inset:0;background:rgba(10,8,5,.75);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
#modal-veil.open{display:flex}
#modal{background:var(--leather);border:1px solid var(--brass);border-radius:5px;max-width:640px;width:92%;max-height:84vh;display:flex;flex-direction:column;box-shadow:0 10px 50px #000}
#modal-title{padding:12px 18px;border-bottom:1px solid var(--line);font-size:20px}
#modal-body{padding:16px 18px;overflow-y:auto;font-size:14px;line-height:1.6}
#modal-foot{padding:10px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
select,input[type=file]{background:var(--soot);color:var(--parch);border:1px solid var(--line);border-radius:3px;padding:6px;font-family:inherit;font-size:13px}

/* dice overlay */
#dice-overlay{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;display:none}
#dice-overlay.rolling{display:block}
.big-d20{
  width:110px;height:110px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:40px;font-weight:bold;color:#F2D9A0;text-shadow:0 2px 4px #000;
  background:radial-gradient(circle at 35% 30%, #8E3D2C, #4E1E14 75%);
  clip-path:polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
  animation:d20spin .55s ease-out;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.7));
}
@keyframes d20spin{0%{transform:rotate(-200deg) scale(.3);opacity:0}70%{transform:rotate(12deg) scale(1.08)}100%{transform:rotate(0) scale(1);opacity:1}}

/* floating damage text */
.float-txt{position:absolute;z-index:30;font-family:var(--mono);font-weight:bold;font-size:17px;pointer-events:none;animation:floatUp 1.1s ease-out forwards;text-shadow:0 1px 3px #000}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}

/* toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--raised);border:1px solid var(--brass);color:var(--parch);padding:9px 20px;border-radius:4px;z-index:300;display:none;font-family:var(--serif-display);font-variant:small-caps;letter-spacing:.05em;box-shadow:0 4px 20px #000}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
@media (max-width:1050px){
  #game-right{display:none}
  #builder-sheet{display:none}
}
</style>

"adventures":[
{"id":"barrowmoor","name":"The Bell of Barrowmoor","level":3,"start":"arrival",
 "blurb":"Forty years ago the chapel of Saint Verity sank into the moor, bell and all. Three nights ago it started ringing. A one-shot of moor-mist, drowned faith, and one very dedicated bell-ringer.",
 "companionsOffered":["aldous","wren"],
 "scenes":{

"arrival":{"kicker":"Act I · Lantern Cross","title":"The Village That Stopped Listening",
 "text":["Rain has followed you the last three miles into Lantern Cross, a fist of stone cottages huddled where the road gives up and the moor begins. Every window is shuttered. Every door wears a fresh line of salt across its threshold. From the crooked sign of the Drowned Lamp inn, a single lantern burns — the only light in the village that isn't a candle behind glass.","You hear it before anyone explains it: far out on the moor, deep and patient beneath the rain, a bell is ringing. One toll. A long silence. Another toll.","Inside the Drowned Lamp, a dozen villagers turn to look at you with the specific hope people reserve for armed strangers."],
 "choices":[
  {"text":"Speak with Maud Kessler, the innkeeper, about the bell.","goto":"maud"},
  {"text":"Press the room for rumors — someone here knows more than they're saying.","check":{"skill":"diplomacy","dc":17,"altSkill":"intimidation","success":"rumors-success","failure":"rumors-failure"},"once":true,"flagOnce":"tried-rumors"},
  {"text":"You've heard enough bells. Head for the moor at first light.","goto":"companions"}]},

"maud":{"kicker":"Act I · Lantern Cross","title":"What Maud Remembers",
 "text":["Maud Kessler pours you something amber without being asked. Her hands are steady; her eyes are not.","\"Saint Verity's chapel,\" she says. \"Sank in my grandmother's time — the whole congregation at vespers, bell tower and all, straight down into the bog like the moor opened its mouth. Folk said the ground was judged unworthy of it.\" She snorts. \"Folk say things.\"","\"Three nights back it started tolling. Second night, old Harl's grave in the yard was open — from the inside, mind. Last night it was four graves. My gran used to say the bell called the faithful to service.\" She meets your eyes. \"I think it still does. I think it's taking attendance.\""],
 "onEnter":{"flag":"met-maud"},
 "choices":[
  {"text":"Ask what she knows about the chapel's layout.","goto":"maud-layout","if":"!knows-layout"},
  {"text":"Return to the common room.","goto":"arrival-return"}]},

"maud-layout":{"kicker":"Act I · Lantern Cross","title":"The Gravetender's Map",
 "text":["Maud digs a yellowed paper from beneath the bar: a child's charcoal rubbing of the old chapel's cornerstone plaque, and beneath it a floor plan drawn in a gravetender's careful hand.","\"Nave, yard, and the crypt below the bell tower. Wren's father drew this — he tended the yard before the sinking took it. The moor's dropped since. On a dry summer the tower top breaks the surface like a snag tooth.\" She taps the crypt. \"If something's ringing that bell, it's ringing it from down here.\"","You commit the plan to memory. Knowing the ground may save your life."],

"use strict";
const PROF_VAL = {U:0,partial:1,T:2,E:4,M:6,L:8};
const PROF_NAME = {U:"Untrained",T:"Trained",E:"Expert",M:"Master",L:"Legendary"};
const ABILITIES = ["str","dex","con","int","wis","cha"];
const ABIL_NAME = {str:"Strength",dex:"Dexterity",con:"Constitution",int:"Intelligence",wis:"Wisdom",cha:"Charisma"};
const SKILLS = {
  acrobatics:"dex", arcana:"int", athletics:"str", crafting:"int", deception:"cha",
  diplomacy:"cha", intimidation:"cha", medicine:"wis", nature:"wis", occultism:"int",
  performance:"cha", religion:"wis", society:"int", stealth:"dex", survival:"wis", thievery:"dex"
};
const CHAR_LEVEL = 3;

/* ---------- Content Registry ---------- */
const Registry = {
  packs:[], ancestries:{}, backgrounds:{}, classes:{}, feats:{}, spells:{}, items:{},
  monsters:{}, companions:{}, adventures:{},
  loadPack(pack){
    const errs = Validator.validate(pack);
    if(errs.length) throw new Error("Content pack rejected:\n• "+errs.join("\n• "));
    const put=(map,arr)=>{ (arr||[]).forEach(o=>{ map[o.id]=o; }); };
    put(this.ancestries,pack.ancestries); put(this.backgrounds,pack.backgrounds);
    put(this.classes,pack.classes); put(this.feats,pack.feats); put(this.spells,pack.spells);
    put(this.items,pack.items); put(this.monsters,pack.monsters); put(this.companions,pack.companions);
    put(this.adventures,pack.adventures);
    this.packs.push(pack.pack);
    return pack.pack;
  },
  list(map,filter){ return Object.values(map).filter(filter||(()=>true)); }
};

/* ---------- Pack validation (friendly errors for JSON authors) ---------- */
const Validator = {
  validate(pack){
    const errs=[];
    if(!pack || typeof pack!=="object"){ return ["Top level must be a JSON object."]; }
    if(!pack.pack || !pack.pack.id || !pack.pack.name) errs.push('Missing "pack" metadata: needs at least {"id","name","type"}.');
    const checkIds=(arr,label,req)=>{ (arr||[]).forEach((o,i)=>{
      if(!o.id) errs.push(`${label}[${i}] is missing an "id".`);
      if(!o.name) errs.push(`${label}[${i}] (${o.id||"?"}) is missing a "name".`);
      (req||[]).forEach(k=>{ if(o[k]===undefined) errs.push(`${label} "${o.id||i}" is missing required field "${k}".`); });
    });};
    checkIds(pack.ancestries,"ancestries",["hp","speed","boosts","heritages"]);
    checkIds(pack.backgrounds,"backgrounds",["boosts","skills"]);
    checkIds(pack.classes,"classes",["hp","keyAbility","perception","saves","attacks","defenses","skillCount"]);
    checkIds(pack.feats,"feats",["type","level"]);
    checkIds(pack.spells,"spells",["rank","traditions","actions","rankEffects"]);
    checkIds(pack.items,"items",["category"]);
    checkIds(pack.monsters,"monsters",["ac","hp","attacks","saves"]);
    checkIds(pack.adventures,"adventures",["start","scenes"]);
    (pack.adventures||[]).forEach(a=>{
      Object.entries(a.scenes||{}).forEach(([sid,sc])=>{
        (sc.choices||[]).forEach((c,i)=>{
          const dest = c.goto || (c.check&&(c.check.success||c.check.failure)) || c.combat;
          if(!dest && !c.combat) errs.push(`Adventure "${a.id}" scene "${sid}" choice ${i} has no destination (goto/check/combat).`);
          if(c.goto && c.goto!=="END" && !a.scenes[c.goto]) errs.push(`Adventure "${a.id}": scene "${sid}" points to missing scene "${c.goto}".`);
          if(c.check){ ["success","failure"].forEach(k=>{ if(c.check[k] && !a.scenes[c.check[k]]) errs.push(`Adventure "${a.id}": check in "${sid}" points to missing scene "${c.check[k]}".`); }); }
          if(c.combat && a.encounters && !a.encounters[c.combat] && !(pack.adventures.some(x=>x.encounters&&x.encounters[c.combat]))) errs.push(`Adventure "${a.id}": scene "${sid}" references missing encounter "${c.combat}".`);
        });
      });
    });
    return errs;
  }
};

/* ---------- Dice ---------- */
const Dice = {
  d(n){ return 1+Math.floor(Math.random()*n); },
  roll(formula){ // "2d6+3", "1d8", "3", "2d8+16"
    let total=0; const parts=String(formula).replace(/\s/g,"").split("+");
    const detail=[];
    for(const p of parts){
      const m = p.match(/^(\d*)d(\d+)$/);
      if(m){ const n=parseInt(m[1]||"1"), s=parseInt(m[2]);
        for(let i=0;i<n;i++){ const r=this.d(s); total+=r; detail.push(r);} }
      else { const v=parseInt(p)||0; total+=v; if(v) detail.push("+"+v); }
    }
    return {total,detail:detail.join(","),formula};
  },
  degree(d20, total, dc){
    let deg = total>=dc+10?3 : total>=dc?2 : total<=dc-10?0 : 1;
    if(d20===20) deg=Math.min(3,deg+1);
    if(d20===1) deg=Math.max(0,deg-1);
    return deg; // 0 critFail 1 fail 2 success 3 critSuccess
  }
};
const DEG_NAME=["Critical Failure","Failure","Success","Critical Success"];
const DEG_CLASS=["crit-failure","failure","success","crit-success"];

/* ---------- Character (build → derived sheet) ---------- */
function newBuild(){
  return {name:"", ancestry:null, heritage:null, background:null, cls:null, subclass:null,
    boosts:{ancestry:[], bgA:null, bgFree:null, key:null, free:[]},
    skills:[], loreExtra:[], feats:{}, extraPicks:[], focusChoices:{},
    spells:{cantrips:[], r1:[], r2:[]}, gear:{weapon:null, weapon2:null, ranged:null, armor:null, shield:false}};
}

/* Collect every effects[] array active on a build */
function activeEffects(build){
  const out=[]; const push=(src,effs)=>{ (effs||[]).forEach(e=>out.push({src,e})); };
  const anc=Registry.ancestries[build.ancestry], her=anc&&(anc.heritages||[]).find(h=>h.id===build.heritage);
  if(her) push(her.name,her.effects);
  const cls=Registry.classes[build.cls];
  if(cls){ (cls.features||[]).forEach(f=>{ if(f.level<=CHAR_LEVEL) push(f.name,f.effects); if(f.special) out.push({src:f.name,e:{special:f.special}}); }); }
  const sub=cls&&cls.subclass&&(cls.subclass.options||[]).find(o=>o.id===build.subclass);
  if(sub) push(sub.name,sub.effects);
  Object.values(build.feats).flat().filter(Boolean).forEach(fid=>{
    const f=Registry.feats[fid]; if(f) push(f.name,f.effects);
  });
  return out;
}

function abilityMods(build){
  const mods={str:0,dex:0,con:0,int:0,wis:0,cha:0};
  const anc=Registry.ancestries[build.ancestry];
  if(anc){
    anc.boosts.forEach((b,i)=>{ if(b!=="free"&&mods[b]!==undefined) mods[b]++; });
    (anc.flaws||[]).forEach(f=>mods[f]--);
    (build.boosts.ancestry||[]).forEach(a=>{ if(a) mods[a]++; });
  }
  if(build.boosts.bgA) mods[build.boosts.bgA]++;
  if(build.boosts.bgFree) mods[build.boosts.bgFree]++;
  if(build.boosts.key) mods[build.boosts.key]++;
  (build.boosts.free||[]).forEach(a=>{ if(a) mods[a]++; });
  ABILITIES.forEach(a=>{ mods[a]=Math.min(4,mods[a]); });
  return mods;
}

function finalizeCharacter(build){
  const anc=Registry.ancestries[build.ancestry];
  const cls=Registry.classes[build.cls];
  const bg=Registry.backgrounds[build.background];
  const abil=abilityMods(build);
  const effs=activeEffects(build);
  const specials=new Set(effs.filter(x=>x.e.special).map(x=>x.e.special));
  const notes=effs.filter(x=>x.e.note).map(x=>`${x.src}: ${x.e.note}`);

  // proficiencies
  const prof={perception:cls.perception, classDC:cls.classDC||"T",
    saves:{...cls.saves}, attacks:{unarmed:"T",simple:"U",martial:"U",advanced:"U",...cls.attacks},
    defenses:{unarmored:"T",light:"U",medium:"U",heavy:"U",...cls.defenses},
    spellcasting: cls.spellcasting? "T":"U"};
  // skills
  const skills={}; Object.keys(SKILLS).forEach(s=>skills[s]="U");
  (bg.skills||[]).forEach(s=>skills[s]="T");
  build.skills.forEach(s=>{ if(skills[s]==="U") skills[s]="T"; });
  // skill increase at 3 → builder stores in build.skillIncrease (raise T→E)
  const lores=[]; if(bg.lore) lores.push({name:bg.lore,rank:"T"});

  // apply effects
  let tradition = cls.spellcasting? cls.spellcasting.tradition : null;
  let focusMax=0; const focusSpells=[]; const resists=[]; let hpBonus=0, speedBonus=0, initBonus=0; const sensesExtra=[];
  effs.forEach(({src,e})=>{
    if(e.profUp){ const t=e.profUp.target;
      if(e.profUp.ifSubclass && !(build.subclass||"").includes(e.profUp.ifSubclass)) return;
      const up=(cur)=> PROF_VAL[e.profUp.rank]>PROF_VAL[cur]? e.profUp.rank:cur;
      if(t==="perception") prof.perception=up(prof.perception);
      else if(t.startsWith("save.")){ const s=t.split(".")[1];
        if(s==="all"){} else prof.saves[s]=up(prof.saves[s]); }
    }
    if(e.attackProf) Object.entries(e.attackProf).forEach(([k,v])=>{ if(PROF_VAL[v]>PROF_VAL[prof.attacks[k]||"U"]) prof.attacks[k]=v; });
    if(e.armorProf) Object.entries(e.armorProf).forEach(([k,v])=>{ if(PROF_VAL[v]>PROF_VAL[prof.defenses[k]||"U"]) prof.defenses[k]=v; });
    if(e.trainSkill && e.trainSkill!=="choice"){ if(skills[e.trainSkill]==="U") skills[e.trainSkill]="T"; }
    if(e.grantLore) lores.push({name:e.grantLore,rank:e.rank||"T"});
    if(e.bonus){ const b=e.bonus;
      if(b.target==="speed"&&!b.vs) speedBonus+=b.value;
      else if(b.target==="hp") hpBonus+=b.value;
      else if(b.target==="initiative") initBonus+=b.value;
    }
    if(e.resist) resists.push({type:e.resist.type, value:e.resist.value==="halfLevel"?Math.max(1,Math.floor(CHAR_LEVEL/2)):e.resist.value});
    if(e.focusPoints) focusMax=Math.min(3,focusMax+e.focusPoints);
    if(e.grantFocusSpell) focusSpells.push(e.grantFocusSpell);
    if(e.grantFocusSpellChoice){ const pick=build.focusChoices[src]||e.grantFocusSpellChoice[0]; focusSpells.push(pick); }
    if(e.tradition) tradition=e.tradition;
    if(e.sense) sensesExtra.push(e.sense);
    if(e.font) specials.add("font-"+e.font);
  });
  if(build.skillIncrease && skills[build.skillIncrease]==="T") skills[build.skillIncrease]="E";
  if(specials.has("toughness")) hpBonus+=CHAR_LEVEL;

  // gear
  const wep = Registry.items[build.gear.weapon]||Registry.items["fist"];
  const wep2 = build.gear.weapon2? Registry.items[build.gear.weapon2]:null;
  const rng = build.gear.ranged? Registry.items[build.gear.ranged]:null;
  const armor = Registry.items[build.gear.armor]||Registry.items["explorers-clothing"];
  // deadly simplicity: deity weapon die up one step (approx: apply to simple weapons)
  const dieUp=d=>({"1d4":"1d6","1d6":"1d8","1d8":"1d10","1d10":"1d12","1d12":"1d12"}[d]||d);

  const lvl=CHAR_LEVEL;
  const profB=(rank)=> rank==="U"?0:PROF_VAL[rank]+lvl;
  const armorRank = prof.defenses[armor.prof]||"U";
  const dexToAC = Math.min(abil.dex, armor.dexCap!==undefined?armor.dexCap:5);
  const ac = 10 + profB(armorRank==="U"?"U":armorRank) + dexToAC + armor.acBonus;
  const hp = anc.hp + (cls.hp+abil.con)*lvl + hpBonus;
  let speed = anc.speed + speedBonus - (specials.has("ignore-armor-speed")?0:(armor.speedPen||0));

  const saves={};
  ["fort","ref","will"].forEach(s=>{
    const ab=s==="fort"?"con":s==="ref"?"dex":"wis";
    saves[s]=profB(prof.saves[s])+abil[ab];
  });
  const perception=profB(prof.perception)+abil.wis;
  const keyAbil = build.boosts.key || cls.keyAbility[0];

  function weaponAttack(item,opts){
    if(!item) return null;
    const cat=item.prof; let rank=prof.attacks[cat]||"U";
    if(rank==="partial") rank=item.rogueOk?"T":"U";
    const finesse=(item.traits||[]).includes("finesse");
    const isRanged=!!item.range;
    const atkAbil = isRanged? "dex" : (finesse? (abil.dex>abil.str?"dex":"str") : "str");
    let dmgAbil = isRanged? ((item.traits||[]).includes("propulsive")? Math.floor(abil.str/2):0) : abil.str;
    if(!isRanged && finesse && specials.has("racket-thief") && abil.dex>abil.str) dmgAbil=abil.dex;
    let die=item.damage;
    if(specials.has("deadly-simplicity") && item.prof==="simple") die=dieUp(die);
    const itemAtk = 1; // +1 weapon potency rune, standard 3rd-level kit
    return {name:item.name, id:item.id, bonus:profB(rank)+abil[atkAbil]+itemAtk, die,
      dmgMod:typeof dmgAbil==="number"?dmgAbil:0, damageType:item.damageType,
      traits:item.traits||[], range:item.range?Math.floor(item.range/5):1, ranged:isRanged,
      statusDmg:(specials.has("emblazon")?1:0)};
  }
  const attacks=[weaponAttack(wep)];
  if(wep2) attacks.push(weaponAttack(wep2));
  if(rng) attacks.push(weaponAttack(rng));
  if(specials.has("witchs-armaments")) attacks.push({name:"Eldritch Nails",id:"nails",bonus:profB("T")+Math.max(abil.dex,abil.str)+0,die:"1d6",dmgMod:abil.str,damageType:"slashing",traits:["agile","finesse"],range:1,ranged:false,statusDmg:0});
  if(!wep2 && !attacks.some(a=>a&&!a.ranged)) attacks.push(weaponAttack(Registry.items["fist"]));

  // spellcasting
  let casting=null;
  if(cls.spellcasting){
    const sc=cls.spellcasting;
    const castAbil=abil[sc.ability];
    const dc=10+profB("T")+castAbil, atk=profB("T")+castAbil;
    let cantrips=[...build.spells.cantrips,...(sc.grantCantrips||[])];
    cantrips=[...new Set(cantrips)];
    casting={tradition,type:sc.type,ability:sc.ability,dc,attack:atk,
      cantrips, r1:[...build.spells.r1], r2:[...build.spells.r2],
      slots:{1:sc.slots["1"],2:sc.slots["2"]},
      font: specials.has("font-heal")? {spell:"heal",uses:4}:null};
  }
  return {
    name:build.name||"The Nameless", level:lvl, build,
    ancestry:anc.name, heritage:(anc.heritages.find(h=>h.id===build.heritage)||{}).name,
    background:bg.name, className:cls.name,
    subclassName: cls.subclass? ((cls.subclass.options.find(o=>o.id===build.subclass)||{}).name||"") : "",
    abil, hpMax:hp, ac, speed, saves, perception, initBonus,
    skills, lores, prof, specials:[...specials], notes, resists,
    attacks:attacks.filter(Boolean), casting, focusMax, focusSpells:[...new Set(focusSpells)],
    senses:[...new Set([...(anc.senses||[]),...sensesExtra])],
    consumables:[{id:"healing-potion-minor",count:2+(specials.has("cauldron")?2:0)}]
  };
}

/* skill modifier for a finalized character */
function skillMod(ch, skill){
  if(skill==="perception") return ch.perception;
  const rank=ch.skills[skill]||"U";
  const b= rank==="U"?0:PROF_VAL[rank]+ch.level;
  return b+ch.abil[SKILLS[skill]];
}
/* ============================================================
   CHARACTER BUILDER
   ============================================================ */
const Builder = {
  build:null, step:0,
  open(){ this.build=newBuild(); this.step=0; App.show("builder"); this.render(); },
  steps(){
    const b=this.build; const s=[
      {id:"origin",label:"Name & Ancestry"},
      {id:"heritage",label:"Heritage"},
      {id:"background",label:"Background"},
      {id:"class",label:"Class"}];
    const cls=b.cls&&Registry.classes[b.cls];
    if(cls&&cls.subclass) s.push({id:"subclass",label:cls.subclass.label});
    s.push({id:"attributes",label:"Attributes"});
    s.push({id:"skills",label:"Skills"});
    s.push({id:"feats",label:"Feats"});
    if(cls&&cls.spellcasting) s.push({id:"spells",label:"Spells"});
    s.push({id:"gear",label:"Equipment"});
    s.push({id:"review",label:"Review"});
    return s;
  },
  /* ---- dynamic extra picks from current selections ---- */
  extras(){
    const b=this.build, out={skills:0,cantrips:0,classFeat1:0,general:0,focusChoosers:[]};
    const scan=(src,effs)=>{ (effs||[]).forEach(e=>{
      if(e.trainSkill==="choice") out.skills++;
      if(e.grantCantrip) out.cantrips++;
      if(e.grantFeat==="class-1") out.classFeat1++;
      if(e.grantFeat==="general") out.general++;
      if(e.grantFocusSpellChoice) out.focusChoosers.push({src,options:e.grantFocusSpellChoice});
      if(e.special==="cantrip-expansion") out.cantrips+=2;
    });};
    const anc=Registry.ancestries[b.ancestry];
    const her=anc&&(anc.heritages||[]).find(h=>h.id===b.heritage); if(her) scan(her.name,her.effects);
    const cls=Registry.classes[b.cls];
    const sub=cls&&cls.subclass&&(cls.subclass.options||[]).find(o=>o.id===b.subclass); if(sub) scan(sub.name,sub.effects);
    Object.values(b.feats).flat().filter(Boolean).forEach(fid=>{ const f=Registry.feats[fid]; if(f) scan(f.name,f.effects); });
    return out;
  },
  fixedTrainedSkills(){
    const b=this.build, set=new Set();
    const bg=Registry.backgrounds[b.background]; if(bg)(bg.skills||[]).forEach(s=>set.add(s));
    const cls=Registry.classes[b.cls];
    if(cls)(cls.trainedSkills||[]).forEach(s=>{ if(typeof s==="string") set.add(s); });
    activeEffects(b).forEach(({e})=>{ if(e.trainSkill&&e.trainSkill!=="choice") set.add(e.trainSkill); });
    return set;
  },
  skillBudget(){
    const b=this.build, cls=Registry.classes[b.cls]; if(!cls) return 0;
    const abil=abilityMods(b);
    let n=cls.skillCount+Math.max(0,abil.int)+this.extras().skills;
    (cls.trainedSkills||[]).forEach(s=>{ if(Array.isArray(s)) n++; }); // "choose one of" counts as a pick
    return n;
  },
  render(){
    const steps=this.steps();
    if(this.step>=steps.length) this.step=steps.length-1;
    const cur=steps[this.step];
    // rail
    const rail=document.getElementById("builder-steps");
    rail.innerHTML=steps.map((s,i)=>{
      const cl= i===this.step?"current": i<this.step?"done": this.canReach(i)?"":"locked";
      return `<div class="bstep ${cl}" data-i="${i}"><span class="st-num">${i<this.step?"✓":i+1}</span>${s.label}</div>`;
    }).join("");
    rail.querySelectorAll(".bstep").forEach(el=>el.onclick=()=>{ const i=+el.dataset.i; if(i<=this.step||this.canReach(i)){ this.step=i; this.render(); }});
    // body
    const body=document.getElementById("builder-body");
    body.innerHTML=this["ui_"+cur.id]();
    this.bind(cur.id);
    // footer
    document.getElementById("bld-back").disabled=this.step===0;
    const nextBtn=document.getElementById("bld-next");
    nextBtn.textContent = cur.id==="review"? "⚒ Forge This Hero" : "Next ▸";
    nextBtn.disabled=!this.stepValid(cur.id);
    nextBtn.onclick=()=>{ if(cur.id==="review"){ this.finish(); } else { this.step++; this.render(); } };
    document.getElementById("bld-back").onclick=()=>{ this.step--; this.render(); };
    this.renderSheet();
    body.scrollTop=0;
  },
  canReach(i){ // all prior steps valid
    const steps=this.steps();
    for(let k=0;k<i;k++) if(!this.stepValid(steps[k].id)) return false;
    return true;
  },
  stepValid(id){
    const b=this.build;
    switch(id){
      case "origin": return !!(b.name.trim()&&b.ancestry);
      case "heritage": return !!b.heritage;
      case "background": return !!b.background;
      case "class": return !!b.cls;
      case "subclass": return !!b.subclass;
      case "attributes": {
        const anc=Registry.ancestries[b.ancestry]; if(!anc) return false;
        const freeAnc=anc.boosts.filter(x=>x==="free").length;
        return b.boosts.ancestry.filter(Boolean).length===freeAnc && !!b.boosts.bgA && !!b.boosts.bgFree
          && !!b.boosts.key && b.boosts.free.filter(Boolean).length===4;
      }
      case "skills": return b.skills.length===this.skillBudget() && !!b.skillIncrease;
      case "feats": return this.featSlots().every(sl=> !!b.feats[sl.key]);
      case "spells": {
        const c=Registry.classes[b.cls].spellcasting, ex=this.extras();
        const nC=c.cantrips+ex.cantrips;
        const n1=c.type==="spontaneous"? c.repertoire["1"]:c.slots["1"];
        const n2=c.type==="spontaneous"? c.repertoire["2"]:c.slots["2"];
        return b.spells.cantrips.length===nC && b.spells.r1.length===n1 && b.spells.r2.length===n2;
      }
      case "gear": return !!b.gear.weapon&&!!b.gear.armor;
      case "review": return true;
    }
    return true;
  },
  bind(id){ const fn=this["bind_"+id]; if(fn) fn.call(this); },

    const picked=b.skills.length;
    const rows=Object.keys(SKILLS).map(s=>{
      const isFixed=fixed.has(s), isPicked=b.skills.includes(s);
      const rank=isFixed||isPicked?"T":"U";
      const mod=this.previewSkillMod(s, rank==="T", b.skillIncrease===s);
      return `<div class="skill-row"><div class="sk-name">${cap(s)}</div>
        <span class="prof-pip ${b.skillIncrease===s?"E":rank} ${isFixed?"fixed":""}">${b.skillIncrease===s?"Expert":PROF_NAME[rank]}</span>
        <div class="sk-mod">${mod>=0?"+":""}${mod}</div>
        <div class="sk-pick">
          ${isFixed?`<span class="small">granted</span>`:
            `<button class="pick-btn ${isPicked?"picked":""}" data-s="${s}" data-k="train" ${!isPicked&&picked>=budget?"disabled":""}>${isPicked?"Trained ✓":"Train"}</button>`}
          ${(isFixed||isPicked)?`<button class="pick-btn ${b.skillIncrease===s?"picked":""}" data-s="${s}" data-k="inc">${b.skillIncrease===s?"Expert ✓":"Lvl 3 ↑"}</button>`:""}
        </div></div>`;
    }).join("");
    return `<div class="step-title">Skills</div>
    <div class="step-hint">Choose your trained skills, then spend your level-3 skill increase to raise one to expert.</div>
    <span class="counter-pill">Trained picks: ${picked} / ${budget}</span>
    <span class="counter-pill">Level 3 increase: ${b.skillIncrease?cap(b.skillIncrease)+" → Expert":"unspent"}</span>
    ${rows}`;
  },
  previewSkillMod(s,trained,expert){
    const b=this.build, abil=abilityMods(b);
    const pb= expert? PROF_VAL.E+CHAR_LEVEL : trained? PROF_VAL.T+CHAR_LEVEL : 0;
    return pb+abil[SKILLS[s]];
  },
  bind_skills(){
    const b=this.build;
    document.querySelectorAll("#builder-body .pick-btn").forEach(el=>el.onclick=()=>{
      const s=el.dataset.s;
      if(el.dataset.k==="train"){
        if(b.skills.includes(s)){ b.skills=b.skills.filter(x=>x!==s); if(b.skillIncrease===s) b.skillIncrease=null; }
        else b.skills.push(s);
      } else { b.skillIncrease=b.skillIncrease===s?null:s; }
      this.render();
    });
  },

  featSlots(){
    const b=this.build, cls=Registry.classes[b.cls], ex=this.extras();
    const slots=[{key:"ancestry1",label:"Ancestry Feat (1st)",type:"ancestry",level:1}];
    slots.push({key:"class1",label:"Class Feat (1st)",type:"class",level:1});
    for(let i=0;i<ex.classFeat1;i++) slots.push({key:"class1x"+i,label:"Bonus Class Feat (1st)",type:"class",level:1});
    slots.push({key:"class2",label:"Class Feat (2nd)",type:"class",level:2});
    const skillLvls=(cls.featLevels&&cls.featLevels.skill)||[2];
    skillLvls.forEach(L=>slots.push({key:"skill"+L,label:`Skill Feat (${ord(L)})`,type:"skill",level:L}));
    slots.push({key:"general3",label:"General Feat (3rd)",type:"general",level:3});
    for(let i=0;i<ex.general;i++) slots.push({key:"generalx"+i,label:"Bonus General Feat",type:"general",level:1});
    return slots;
  },
  featOptions(slot){
    const b=this.build;
    return Registry.list(Registry.feats,f=>{
      if(f.type!==slot.type) return false;
      if(f.level>slot.level) return false;
      if(slot.type==="ancestry"&&f.ancestry!==b.ancestry) return false;
      if(slot.type==="class"&&!(f.classes||[]).includes(b.cls)) return false;
      return true;
    });
  },
  featPrereqOk(f){
    const b=this.build;
    if(!f.prereq) return true;
    if(f.prereq.skill){ const fixed=this.fixedTrainedSkills();
      return Object.keys(f.prereq.skill).every(s=>fixed.has(s)||b.skills.includes(s)); }
    return true;
  },
  ui_feats(){
    const b=this.build, taken=new Set(Object.values(b.feats).flat().filter(Boolean));
    const ex=this.extras();
    let html=`<div class="step-title">Feats</div>
    <div class="step-hint">Your tricks of the trade. Grayed feats have unmet prerequisites; a feat can be taken only once.</div>`;
    this.featSlots().forEach(slot=>{
      const opts=this.featOptions(slot);
      html+=`<div class="section-sub">${slot.label}</div><div class="card-grid">`+
        opts.map(f=>{
          const sel=b.feats[slot.key]===f.id;
          const dup=taken.has(f.id)&&!sel;
          const ok=this.featPrereqOk(f)&&!dup;
          return `<div class="opt-card ${sel?"selected":""} ${ok?"":"disabled"}" data-slot="${slot.key}" data-id="${f.id}">
            <h3>${f.name}</h3><div class="meta">${f.type} ${f.level}${f.actions?" · "+(f.actions==="reaction"?"⟲ reaction":f.actions==="free"?"◇ free":"◆".repeat(f.actions)):""}</div>
            <div class="desc">${f.desc}</div>${dup?'<div class="tagrow"><span class="tag">already taken</span></div>':""}</div>`;
        }).join("")+`</div>`;
    });
    if(ex.focusChoosers.length){
      html+=`<div class="section-sub">Granted Choices</div>`;
      ex.focusChoosers.forEach(fc=>{
        html+=`<div class="boost-row"><div class="boost-label">${fc.src}</div><div class="boost-choice">`+
          fc.options.map(o=>{ const sp=Registry.spells[o];
            return `<button class="pick-btn ${b.focusChoices[fc.src]===o?"picked":""}" data-fc="${esc(fc.src)}" data-o="${o}">${sp?sp.name:o}</button>`; }).join("")+`</div></div>`;
      });
    }
    return html;
  },
  bind_feats(){
    const b=this.build;
    document.querySelectorAll("#builder-body .opt-card:not(.disabled)").forEach(el=>el.onclick=()=>{
      const k=el.dataset.slot; b.feats[k]=b.feats[k]===el.dataset.id?null:el.dataset.id; this.render();
    });
    document.querySelectorAll("#builder-body [data-fc]").forEach(el=>el.onclick=()=>{
      b.focusChoices[el.dataset.fc]=el.dataset.o; this.render();
    });
  },

  ui_spells(){
    const b=this.build, cls=Registry.classes[b.cls], sc=cls.spellcasting, ex=this.extras();
    let trad=sc.tradition;
    if(trad==="patron"){ const sub=(cls.subclass.options||[]).find(o=>o.id===b.subclass);
      trad=((sub&&sub.effects)||[]).filter(e=>e.tradition).map(e=>e.tradition)[0]||"occult"; }
    const nC=sc.cantrips+ex.cantrips;
    const n1=sc.type==="spontaneous"?sc.repertoire["1"]:sc.slots["1"];
    const n2=sc.type==="spontaneous"?sc.repertoire["2"]:sc.slots["2"];
    const pool=r=>Registry.list(Registry.spells,s=>s.rank===r&&!s.focus&&s.traditions.includes(trad)&&!(sc.grantCantrips||[]).includes(s.id));
    const grid=(spells,sel,slotKey,cap)=>`<div class="card-grid">`+spells.map(s=>{
      const isSel=sel.includes(s.id);
      const full=!isSel&&sel.length>=cap;
      return `<div class="opt-card ${isSel?"selected":""} ${full?"disabled":""}" data-sp="${s.id}" data-key="${slotKey}">
        <h3>${s.name}</h3><div class="meta">${"◆".repeat(Math.min(3,s.actions||2))} · ${s.range?s.range+" ft":"self/area"}${s.save?" · "+cap3(s.save)+" save":s.attackRoll?" · spell attack":""}</div>
        <div class="desc">${s.desc}</div><div class="tagrow">${(s.traits||[]).map(t=>`<span class="tag t-trait">${t}</span>`).join("")}</div></div>`;
    }).join("")+`</div>`;
    const label1=sc.type==="spontaneous"?"Repertoire — Rank 1":"Prepared — Rank 1";
    const label2=sc.type==="spontaneous"?"Repertoire — Rank 2":"Prepared — Rank 2";
    return `<div class="step-title">Spells — ${cap(trad)} Tradition</div>
    <div class="step-hint">${sc.type==="spontaneous"?"Spontaneous: you know these and cast them with flexible slots.":"Prepared: this is today's preparation; slots match one-for-one."}${(sc.grantCantrips||[]).length?` Your class grants: ${sc.grantCantrips.map(c=>Registry.spells[c].name).join(", ")}.`:""}</div>
    <div class="section-sub">Cantrips <span class="counter-pill">${b.spells.cantrips.length} / ${nC}</span></div>
    ${grid(pool(0),b.spells.cantrips,"cantrips",nC)}
    <div class="section-sub">${label1} <span class="counter-pill">${b.spells.r1.length} / ${n1}</span></div>
    ${grid(pool(1),b.spells.r1,"r1",n1)}
    <div class="section-sub">${label2} <span class="counter-pill">${b.spells.r2.length} / ${n2}</span> <span class="small">(rank-1 spells may be heightened into rank-2 preparations)</span></div>
    ${grid([...pool(2),...pool(1)],b.spells.r2,"r2",n2)}`;
  },
  bind_spells(){
    const b=this.build;
    document.querySelectorAll("#builder-body [data-sp]").forEach(el=>el.onclick=()=>{
      if(el.classList.contains("disabled")) return;
      const key=el.dataset.key, id=el.dataset.sp, arr=b.spells[key];
      const i=arr.indexOf(id); if(i>=0) arr.splice(i,1); else arr.push(id);
      this.render();
    });
  },

  ui_gear(){
    const b=this.build, cls=Registry.classes[b.cls];
    const granted={}; activeEffects(b).forEach(({e})=>{ if(e.attackProf) Object.assign(granted,e.attackProf); });
    const canUse=w=>{ let r=granted[w.prof]||cls.attacks[w.prof]||"U";
      if(cls.attacks[w.prof]==="partial"&&!granted[w.prof]) r=w.rogueOk?"T":"U";
      return r!=="U"&&r!=="partial"||(r==="partial"&&w.rogueOk); };
    const weapons=Registry.list(Registry.items,i=>i.category==="weapon"&&i.id!=="fist"&&canUse(i));
    const armors=Registry.list(Registry.items,i=>i.category==="armor"&&(cls.defenses[i.prof]&&cls.defenses[i.prof]!=="U"||i.prof==="unarmored"||this.armorGranted(i.prof)));
    const wcard=(w,sel,key)=>`<div class="opt-card ${sel?"selected":""}" data-g="${key}" data-id="${w.id}">
      <h3>${w.name}</h3><div class="meta">${w.damage} ${w.damageType}${w.range?" · range "+w.range+" ft":""}${w.hands===2?" · two hands":""}</div>
      <div class="tagrow">${(w.traits||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div></div>`;
    return `<div class="step-title">Equipment</div>
    <div class="step-hint">A 3rd-level kit: your main weapon bears a +1 potency rune, and two minor healing potions ride in your pack.</div>
    <div class="section-sub">Main Weapon (+1 rune)</div><div class="card-grid">${weapons.map(w=>wcard(w,b.gear.weapon===w.id,"weapon")).join("")}</div>
    <div class="section-sub">Off-hand Weapon <span class="small">(optional — for twin-weapon tricks)</span></div>
    <div class="card-grid">${weapons.filter(w=>w.hands===1&&!w.range).map(w=>wcard(w,b.gear.weapon2===w.id,"weapon2")).join("")}</div>
    <div class="section-sub">Ranged Sidearm <span class="small">(optional)</span></div>
    <div class="card-grid">${weapons.filter(w=>w.range).map(w=>wcard(w,b.gear.ranged===w.id,"ranged")).join("")}</div>
    <div class="section-sub">Armor</div><div class="card-grid">${armors.map(a=>`<div class="opt-card ${b.gear.armor===a.id?"selected":""}" data-g="armor" data-id="${a.id}">
      <h3>${a.name}</h3><div class="meta">AC +${a.acBonus} · Dex cap +${a.dexCap}${a.speedPen?" · –"+a.speedPen+" ft speed":""}</div></div>`).join("")}</div>
    <div class="section-sub">Shield</div>
    <div class="card-grid"><div class="opt-card ${b.gear.shield?"selected":""}" data-g="shield" data-id="steel-shield">
      <h3>Steel Shield</h3><div class="meta">+2 AC when raised · Hardness 5</div><div class="desc">Requires a free hand. Raise Shield is 1 action; Shield Block needs the feat.</div></div></div>`;
  },
  armorGranted(profKey){
    return activeEffects(this.build).some(({e})=>e.armorProf&&e.armorProf[profKey]);
  },
  bind_gear(){
    const b=this.build;
    document.querySelectorAll("#builder-body .opt-card").forEach(el=>el.onclick=()=>{
      const g=el.dataset.g, id=el.dataset.id;
      if(g==="shield") b.gear.shield=!b.gear.shield;
      else if(g==="weapon2"||g==="ranged") b.gear[g]=b.gear[g]===id?null:id;
      else b.gear[g]=id;
      this.render();
    });
  },

  ui_review(){
    const ch=finalizeCharacter(this.build);
    return `<div class="step-title">Review</div>
    <div class="step-hint">Read the fine print. The moor certainly will.</div>
    <div class="parchment" style="padding:20px 24px">${sheetHTML(ch,true)}</div>`;
  },

  renderSheet(){
    const b=this.build, el=document.getElementById("builder-sheet");
    if(!b.ancestry||!b.cls){ el.innerHTML=`<h2>Work in Progress</h2><div class="small" style="text-align:center;margin-top:10px;font-style:italic">Your hero takes shape here as you choose.</div>`; return; }
    try{ const ch=finalizeCharacter(b); el.innerHTML=`<h2>— Preview —</h2>`+miniSheetHTML(ch); }
    catch(e){ el.innerHTML=`<h2>— Preview —</h2><div class="small">${esc(e.message)}</div>`; }
  },
  finish(){
    App.hero=finalizeCharacter(this.build);
    App.chronicle=[];
    App.log(`<b>${esc(App.hero.name)}</b>, ${App.hero.ancestry} ${App.hero.className} ${App.hero.level}, steps onto the page.`,"narr");
    App.toTitle(); App.toast("Hero forged: "+App.hero.name);
    App.autosave();
  }
};

/* ---------- Sheet rendering ---------- */
function miniSheetHTML(ch){
  const line=(k,v)=>`<div class="sheet-line"><span class="k">${k}</span><span class="v">${v}</span></div>`;
  let h=`<div class="sheet-name">${esc(ch.name)||"—"}</div>
  <div class="small" style="text-align:center">${ch.heritage||ch.ancestry} ${ch.background} ${ch.className}${ch.subclassName?" ("+ch.subclassName+")":""} ${ch.level}</div>
  <div class="sheet-block-title">Vitals</div>`;
  h+=line("HP",ch.hpMax)+line("AC",ch.ac)+line("Speed",ch.speed+" ft")+line("Perception","+"+ch.perception);
  h+=`<div class="sheet-block-title">Attributes</div><div class="sheet-line"><span class="v" style="width:100%;text-align:center">${ABILITIES.map(a=>a.toUpperCase()+" "+(ch.abil[a]>=0?"+":"")+ch.abil[a]).join(" · ")}</span></div>`;
  h+=`<div class="sheet-block-title">Saves</div>`+line("Fortitude","+"+ch.saves.fort)+line("Reflex","+"+ch.saves.ref)+line("Will","+"+ch.saves.will);
  h+=`<div class="sheet-block-title">Attacks</div>`;
  ch.attacks.forEach(a=>{ h+=line(a.name,`+${a.bonus} (${a.die}${a.dmgMod?"+"+a.dmgMod:""})`); });
  if(ch.casting){ h+=`<div class="sheet-block-title">Spellcasting</div>`+line("Tradition",cap(ch.casting.tradition))+line("Spell DC",ch.casting.dc)+line("Spell attack","+"+ch.casting.attack)+line("Slots",`R1×${ch.casting.slots[1]} R2×${ch.casting.slots[2]}`);
    if(ch.casting.font) h+=line("Divine font","heal ×"+ch.casting.font.uses); }
  if(ch.focusMax) h+=line("Focus pool",ch.focusMax+" pt");
  const trained=Object.entries(ch.skills).filter(([s,r])=>r!=="U");
  if(trained.length){ h+=`<div class="sheet-block-title">Skills</div><div class="small">${trained.map(([s,r])=>cap(s)+(r==="E"?"*":"")).join(", ")}${ch.lores.length?" · "+ch.lores.map(l=>l.name).join(", "):""}</div>`; }
  return h;
}
function sheetHTML(ch,full){
  let h=miniSheetHTML(ch);
  if(full){
    const featNames=Object.values(ch.build.feats).flat().filter(Boolean).map(id=>(Registry.feats[id]||{name:id}).name);
    h+=`<div class="sheet-block-title">Feats</div><div class="small">${featNames.join(" · ")||"—"}</div>`;
    if(ch.casting){
      const sp=ids=>ids.map(id=>(Registry.spells[id]||{name:id}).name).join(", ")||"—";
      h+=`<div class="sheet-block-title">Cantrips</div><div class="small">${sp(ch.casting.cantrips)}</div>
      <div class="sheet-block-title">Rank 1</div><div class="small">${sp(ch.casting.r1)}</div>
      <div class="sheet-block-title">Rank 2</div><div class="small">${sp(ch.casting.r2)}</div>`;
    }
    if(ch.focusSpells.length) h+=`<div class="sheet-block-title">Focus Spells</div><div class="small">${ch.focusSpells.map(id=>(Registry.spells[id]||{name:id}).name).join(", ")}</div>`;
    if(ch.resists.length) h+=`<div class="sheet-block-title">Resistances</div><div class="small">${ch.resists.map(r=>r.type+" "+r.value).join(", ")}</div>`;
    if(ch.notes.length) h+=`<div class="sheet-block-title">Notes</div><div class="small">${ch.notes.map(esc).join("<br>")}</div>`;
  }
  return h;
}
function esc(s){ return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function cap(s){ return s? s.charAt(0).toUpperCase()+s.slice(1):""; }
function cap3(s){ return cap(s).slice(0,4); }
function ord(n){ return n+(["th","st","nd","rd"][((n%100)-20)%10]||["th","st","nd","rd"][n%100]||"th"); }
/* ============================================================
   TACTICAL COMBAT
   ============================================================ */
const Combat = {
  active:false, cbs:[], order:[], turnIdx:0, round:1, enc:null,
  onVictory:null, onDefeat:null, mapW:0, mapH:0, walls:new Set(), diff:new Set(),
  actions:0, map:0, armed:null, sel:null, huntPreyId:null, surprise:false,

  key(x,y){ return x+","+y; },

  start(encId, adv, opts){
    const enc = adv.encounters[encId];
    this.enc=enc; this.round=1; this.turnIdx=0; this.active=true;
    this.mapW=enc.w; this.mapH=enc.h;
    this.walls=new Set((enc.terrain.walls||[]).map(w=>this.key(w[0],w[1])));
    this.diff=new Set((enc.terrain.diff||[]).map(w=>this.key(w[0],w[1])));
    this.surprise=!!App.flags["surprise-round"]; delete App.flags["surprise-round"];
    const fatigued=!!App.flags["fatigued-start"]; delete App.flags["fatigued-start"];
    this.onVictory=opts.onVictory; this.onDefeat=opts.onDefeat;
    // party
    this.cbs=[];
    const party=App.party(); // [heroCombatant, ...companionCombatants]
    party.forEach((cb,i)=>{
      const st=enc.pcStarts[i]||enc.pcStarts[0];
      cb.x=st[0]; cb.y=st[1]; cb.dead=false; cb.dying=0; cb.conditions=cb.conditions||[]; cb.buffs=[];
      if(fatigued) this.addCond(cb,"fatigued",1,99,true);
      this.cbs.push(cb);
    });
    // foes (scaled by party size)
    const n=party.length;
    enc.foes.forEach((f,i)=>{
      if(f.minParty&&n<f.minParty) return;
      const m=Registry.monsters[f.monster];
      const cb={id:"foe"+i, side:"foe", name:m.name, letter:m.name.match(/[A-Z]/g).slice(0,1)[0]+(i+1), monster:m,
        x:f.x,y:f.y, hpMax:m.hp, hp:m.hp, tempHP:0, ac:m.ac, saves:{...m.saves}, perception:m.perception,
        speed:Math.floor(m.speed/5), attacks:m.attacks, powers:(m.powers||[]).map(p=>({...p,cd:0})),
        conditions:[], buffs:[], slowedBase:m.slowed||0, weaknesses:m.weaknesses||[], resistances:m.resistances||[], immunities:m.immunities||[], boss:m.boss};
      this.cbs.push(cb);
    });
    // boss flags
    if(enc.bossFlags){ Object.entries(enc.bossFlags).forEach(([flag,fx])=>{
      if(App.flags[flag]){ const boss=this.cbs.find(c=>c.boss);
        if(boss)(fx.applyToBoss||[]).forEach(c=>this.addCond(boss,c.c,c.v,c.dur,true));
        if(fx.log) App.log(fx.log,"combat"); } }); }
    // initiative
    this.cbs.forEach(cb=>{
      const mod = cb.side==="pc"? (cb.char? cb.char.perception+cb.char.initBonus : cb.initSkill||cb.perception) : cb.perception;
      cb.init=Dice.d(20)+mod;
      if(this.surprise&&cb.side==="foe") cb.init-=100; // ambushed: act last
    });
    this.order=[...this.cbs].sort((a,b)=>b.init-a.init);
    App.log(`<b>${enc.name}.</b> ${esc(enc.intro||"")}`,"combat");
    App.renderGameChrome();
    App.setCenter(`<div id="combat-wrap">
      <div id="combat-top"><div id="initiative-tracker"></div><div class="small" id="round-label"></div></div>
      <div id="grid-scroll"><div id="grid"></div></div>
      <div id="combat-bottom">
        <div><div class="small" style="text-align:center;margin-bottom:4px">Actions</div><div id="action-pips"></div></div>
        <div style="flex:1"><div id="action-bar"></div><div class="map-hint" id="hint"></div></div>
        <div id="combat-status"></div>
      </div></div>`);
    this.beginTurn(0,true);
  },

  cur(){ return this.order[this.turnIdx]; },
  alive(side){ return this.cbs.filter(c=>c.side===side&&!c.dead); },

  beginTurn(idx,first){
    if(!this.active) return;
    this.turnIdx=idx;
    const cb=this.cur();
    if(cb.dead){ return this.nextTurn(); }
    // start-of-turn: persistent damage & recovery & cooldowns & buffs tick handled at end
    cb.reactionUsed=false; cb.shieldRaised=false; cb.nimbleUsed=false; cb.mapCount=0; cb.flourishUsed=false; cb.hexUsed=false;
    if(cb.side==="pc"&&cb.dying>0){
      const roll=Dice.d(20); const dc=10+cb.dying;
      if(roll>=dc){ cb.dying=Math.max(0,cb.dying-(roll>=dc+10?2:1));
        App.log(`${esc(cb.name)} fights toward the light (recovery ${roll} vs DC ${dc}). Dying ${cb.dying}.`,"combat");
        if(cb.dying===0){ cb.hp=1; App.log(`<b>${esc(cb.name)} regains consciousness!</b>`,"combat"); } }
      else { cb.dying+= (roll<=dc-10?2:1);
        App.log(`${esc(cb.name)} slips deeper (recovery ${roll} vs DC ${dc}). Dying ${cb.dying}.`,"combat");
        if(cb.dying>= (cb.char&&cb.char.specials.includes("diehard")?5:4)){ this.kill(cb); return this.nextTurn(); } }
      if(cb.dying>0){ this.renderAll(); return setTimeout(()=>this.nextTurn(),700); }
    }
    // persistent damage
    const pers=cb.conditions.filter(c=>c.c==="persistent");
    pers.forEach(p=>{ const dmg=Dice.roll(p.formula).total;
      this.applyDamage(cb,dmg,p.dtype,null,`persistent ${p.dtype}`);
      if(Dice.d(20)>=15){ cb.conditions=cb.conditions.filter(x=>x!==p); App.log(`The ${p.dtype} afflicting ${esc(cb.name)} ends.`,"combat"); }});
    if(cb.dead) return this.nextTurn();
    // actions
    let acts=3;
    const stun=this.condVal(cb,"stunned"); if(stun){ acts-=stun; this.decCond(cb,"stunned",stun); }
    const slow=(cb.slowedBase||0)+this.condVal(cb,"slowed-feet");
    acts-=slow;
    this.actions=Math.max(0,acts);
    (cb.powers||[]).forEach(p=>{ if(p.cd>0)p.cd--; });
    this.armed=null; this.sel=null;
    this.renderAll();
    if(cb.side==="foe"){ setTimeout(()=>this.aiTurn(cb),600); }
  },

  endTurn(){
    const cb=this.cur();
    // tick buffs & decrementing conditions
    cb.buffs=cb.buffs.filter(b=>{ if(b.duration!==undefined){ b.duration--; return b.duration>0; } return true; });
    ["frightened","sickened"].forEach(n=>{ const v=this.condVal(cb,n);
      if(v){ const red = (n==="frightened"&&cb.char&&cb.char.specials.includes("bravery"))?2:1;
        this.decCond(cb,n,red); } });
    cb.conditions=cb.conditions.filter(c=>{
      if(c.dur!==undefined&&c.dur<99){ c.dur--; return c.dur>0; } return true; });
    this.nextTurn();
  },
  nextTurn(){
    if(!this.active) return;
    if(this.checkEnd()) return;
    let idx=this.turnIdx;
    for(let i=0;i<this.order.length;i++){
      idx=(idx+1)%this.order.length;
      if(idx===0){ this.round++; this.surprise=false; }
      if(!this.order[idx].dead) break;
    }
    this.beginTurn(idx);
  },
  checkEnd(){
    if(this.alive("foe").length===0){ this.finish(true); return true; }
    const pcs=this.alive("pc");
    if(pcs.length===0||pcs.every(c=>c.dying>0)){ this.finish(false); return true; }
    return false;
  },
  finish(victory){
    this.active=false;
    if(victory){
      App.log(`<b>Victory.</b> The ${esc(this.enc.name)} is yours. You bind wounds, steady breath, and refocus. (Half of missing HP recovered; focus restored.)`,"combat");
      this.cbs.filter(c=>c.side==="pc").forEach(cb=>{
        if(cb.dying>0){ cb.dying=0; cb.hp=1; }
        cb.hp=Math.min(cb.hpMax, cb.hp+Math.ceil((cb.hpMax-cb.hp)/2));
        cb.conditions=[]; cb.buffs=[];
        if(cb.resources) cb.resources.focus=cb.char?cb.char.focusMax:0;
      });
      App.autosave();
      setTimeout(()=>this.onVictory(),900);
    } else {
      App.log(`<b>The line breaks.</b> Darkness takes the field.`,"combat");
      setTimeout(()=>this.onDefeat(),900);
    }
  },
  kill(cb){
    cb.dead=true; cb.hp=0;
    App.log(`<b>${esc(cb.name)} ${cb.side==="foe"?"is destroyed":"falls, and does not rise"}.</b>`,"combat");
  },

  /* ---------- conditions & math ---------- */
  condVal(cb,name){ const c=cb.conditions.find(x=>x.c===name); return c? c.v:0; },
  addCond(cb,name,v,dur,silent){
    if(cb.immunities&&(cb.immunities.includes("mental"))&&["frightened","stunned","bane","hexed","night-shrouded"].includes(name)&&name!=="stunned") { if(!silent) App.log(`${esc(cb.name)} is immune (mindless).`,"combat"); return; }
    if(name==="frightened"&&cb.char&&cb.char.specials.includes("reduce-frightened")) v=Math.max(0,v-1);
    if(v<=0) return;
    const ex=cb.conditions.find(x=>x.c===name);
    if(ex){ ex.v=Math.max(ex.v,v); if(dur!==undefined) ex.dur=Math.max(ex.dur||0,dur); }
    else cb.conditions.push({c:name,v,dur});
    if(!silent) App.log(`${esc(cb.name)} is <b>${name} ${v>1||["frightened","enfeebled","sickened","clumsy","stunned"].includes(name)?v:""}</b>.`,"combat");
  },
  decCond(cb,name,by){ const c=cb.conditions.find(x=>x.c===name); if(!c) return;
    c.v-=by||1; if(c.v<=0) cb.conditions=cb.conditions.filter(x=>x!==c); },
  buffSum(cb,target){
    let status=0, circ=0;
    cb.buffs.forEach(b=>(b.bonuses||[]).forEach(x=>{
      if(x.target===target||x.target==="all"){ if(x.type==="status") status=Math.max(status,x.value); else circ=Math.max(circ,x.value); }}));
    return status+circ;
  },
  atkMod(cb,attack){
    let m=attack.bonus;
    m-=this.condVal(cb,"frightened")+this.condVal(cb,"sickened");
    if(!attack.ranged) m-=this.condVal(cb,"enfeebled");
    m-=this.condVal(cb,"bane")+this.condVal(cb,"hexed")+this.condVal(cb,"night-shrouded");
    if(this.condVal(cb,"prone")) m-=2;
    m+=this.buffSum(cb,"attack");
    return m;
  },
  effAC(target,attacker,opts){
    let ac=target.ac;
    ac-=this.condVal(target,"frightened")+this.condVal(target,"sickened")+this.condVal(target,"clumsy")+this.condVal(target,"fatigued");
    ac+=this.buffSum(target,"ac");
    if(target.shieldRaised) ac+=2;
    let offGuard=false;
    if(this.condVal(target,"prone")) offGuard=true;
    if(opts&&opts.forceOffGuard) offGuard=true;
    if(this.surprise&&target.side==="foe") offGuard=true;
    if(attacker&&!attacker.ranged&&this.isFlanking(attacker,target)) offGuard=true;
    if(offGuard&&!(target.char&&target.char.specials.includes("deny-advantage"))) ac-=2;
    return {ac,offGuard};
  },
  isFlanking(attacker,target){
    if(this.dist(attacker,target)>1) return false;
    return this.cbs.some(a=>a!==attacker&&a.side===attacker.side&&!a.dead&&a.dying===0&&this.dist(a,target)<=1
      && (a.x+attacker.x===2*target.x && a.y+attacker.y===2*target.y));
  },
  saveMod(cb,save){
    let m=cb.saves[save==="fortitude"?"fort":save==="reflex"?"ref":"will"]||0;
    m-=this.condVal(cb,"frightened")+this.condVal(cb,"sickened")+this.condVal(cb,"fatigued")+this.condVal(cb,"hexed");
    if(save==="reflex") m-=this.condVal(cb,"clumsy");
    m+=this.buffSum(cb,"saves");
    // fortune from bit of luck / guidance
    return m;
  },
  applyDamage(target,amount,dtype,attacker,label){
    if((target.immunities||[]).includes(dtype)){ App.log(`${esc(target.name)} is immune to ${dtype}.`,"combat"); return 0; }
    let dmg=amount;
    const w=(target.weaknesses||[]).find(x=>x.type===dtype||x.type==="physical"&&["slashing","piercing","bludgeoning"].includes(dtype));
    if(w){ dmg+=w.value; App.log(`Weakness to ${w.type}! +${w.value}.`,"combat"); }
    const r=(target.resistances||[]).concat(target.char? target.char.resists:[]).find(x=>x&&(x.type===dtype||(x.type==="physical"&&["slashing","piercing","bludgeoning"].includes(dtype))));
    if(r){ dmg=Math.max(0,dmg-r.value); }
    // shield block
    if(target.side==="pc"&&target.shieldRaised&&!target.reactionUsed&&target.char&&target.char.specials.includes("shield-block")
       &&["slashing","piercing","bludgeoning"].includes(dtype)&&dmg>0){
      target.reactionUsed=true; const blocked=Math.min(5,dmg); dmg-=blocked;
      App.log(`${esc(target.name)} <b>Shield Blocks</b>: ${blocked} damage rings off steel.`,"combat");
    }
    if(target.tempHP>0){ const t=Math.min(target.tempHP,dmg); target.tempHP-=t; dmg-=t; }
    target.hp=Math.max(0,target.hp-dmg);
    this.floatText(target,"-"+dmg, dtype==="fire"?"#E8845A":dtype==="cold"?"#8CC7E8":"#E86A5A");
    if(target.hp===0){
      if(target.side==="foe") this.kill(target);
      else if(target.dying===0){ target.dying=1+(target.wounded||0); target.wounded=(target.wounded||0)+1;
        target.conditions=[]; App.log(`<b>${esc(target.name)} falls! Dying ${target.dying}.</b>`,"combat"); }
    }
    return dmg;
  },
  heal(target,amount){
    if(target.dying>0){ target.dying=0; App.log(`${esc(target.name)} is pulled back from the brink.`,"combat"); }
    const h=Math.min(amount,target.hpMax-target.hp);
    target.hp+=h; this.floatText(target,"+"+h,"#8FD68F");
    return h;
  },

  /* ---------- geometry ---------- */
  dist(a,b){ return Math.max(Math.abs(a.x-b.x),Math.abs(a.y-b.y)); },
  occupied(x,y){ return this.cbs.find(c=>!c.dead&&c.x===x&&c.y===y); },
  passable(x,y,mover){
    if(x<0||y<0||x>=this.mapW||y>=this.mapH) return false;
    if(this.walls.has(this.key(x,y))) return false;
    const occ=this.occupied(x,y);
    if(occ&&occ!==mover&&!(occ.side===mover.side)) return false; // can't pass enemies
    return true;
  },
  losClear(a,b){
    let x0=a.x,y0=a.y; const x1=b.x,y1=b.y;
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0), sx=x0<x1?1:-1, sy=y0<y1?1:-1;
    let err=dx-dy;
    while(!(x0===x1&&y0===y1)){
      const e2=2*err;
      if(e2>-dy){ err-=dy; x0+=sx; }
      if(e2<dx){ err+=dx; y0+=sy; }
      if(x0===x1&&y0===y1) break;
      if(this.walls.has(this.key(x0,y0))) return false;
    }
    return true;
  },
  reachable(cb,budget){ // Dijkstra with 5-10-5 diagonals & difficult terrain; returns {key:{cost,prev}}
    const start={x:cb.x,y:cb.y}; const out={}; out[this.key(cb.x,cb.y)]={cost:0,prev:null,diag:0};
    const pq=[{x:cb.x,y:cb.y,cost:0,diag:0}];
    while(pq.length){
      pq.sort((a,b)=>a.cost-b.cost); const n=pq.shift();
      const k=this.key(n.x,n.y); if(out[k]&&out[k].cost<n.cost) continue;
      for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
        if(!dx&&!dy) continue;
        const nx=n.x+dx, ny=n.y+dy;
        if(!this.passable(nx,ny,cb)) continue;
        const diagN=(dx&&dy)? n.diag+1:n.diag;
        let step=(dx&&dy)? ((n.diag%2)?2:1):1;
        if(this.diff.has(this.key(nx,ny))) step+=1;
        const cost=n.cost+step;
        if(cost>budget) continue;
        const nk=this.key(nx,ny);
        if(!out[nk]||out[nk].cost>cost){ out[nk]={cost,prev:k,diag:diagN}; pq.push({x:nx,y:ny,cost,diag:diagN}); }
      }
    }
    return out;
  },

  /* ---------- rendering ---------- */
  renderAll(){ this.renderTracker(); this.renderGrid(); this.renderBar(); App.renderParty(); },
  renderTracker(){
    const el=document.getElementById("initiative-tracker"); if(!el) return;
    el.innerHTML=this.order.map((c,i)=>`<div class="init-chip ${c.side==="foe"?"foe":""} ${i===this.turnIdx?"turn":""} ${c.dead?"dead":""}">
      <span class="in">${c.init>0?c.init:"–"}</span>${esc(c.name)}</div>`).join("");
    const rl=document.getElementById("round-label"); if(rl) rl.textContent="Round "+this.round+(this.surprise?" · surprise!":"");
  },
  renderGrid(){
    const g=document.getElementById("grid"); if(!g) return;
    const S=46; g.style.width=this.mapW*S+"px"; g.style.height=this.mapH*S+"px";
    let html="";
    for(let y=0;y<this.mapH;y++)for(let x=0;x<this.mapW;x++){
      const k=this.key(x,y);
      let cls="floor"+((x+y)%2?" alt":"");
      if(this.walls.has(k)) cls="wall";
      else if(this.diff.has(k)) cls="floor diff";
      html+=`<div class="cell ${cls}" data-x="${x}" data-y="${y}" style="left:${x*S}px;top:${y*S}px"></div>`;
    }
    this.cbs.forEach(c=>{
      const turn=c===this.cur()&&!c.dead;
      html+=`<div class="token ${c.side} ${turn?"turn-glow":""} ${c.dead?"dead":""} ${this.sel===c?"selected-target":""}"
        data-cb="${c.id}" style="left:${c.x*S}px;top:${c.y*S}px" title="${esc(c.name)} — HP ${c.hp}/${c.hpMax}${c.dying?" (dying "+c.dying+")":""}">
        ${c.side==="pc"? esc(c.name[0]) : esc(c.letter||c.name[0])}
        <div class="mini-hp"><i style="width:${Math.round(100*c.hp/c.hpMax)}%;background:${c.hp/c.hpMax>.5?"#7FA657":c.hp/c.hpMax>.25?"#C79A4B":"#C05B45"}"></i></div></div>`;
    });
    g.innerHTML=html;
    this.paintHighlights();
    g.querySelectorAll(".cell").forEach(el=>{ el.onclick=()=>this.cellClick(+el.dataset.x,+el.dataset.y); });
    g.querySelectorAll(".token").forEach(el=>{ el.onclick=(ev)=>{ ev.stopPropagation(); const cb=this.cbs.find(c=>c.id===el.dataset.cb); this.tokenClick(cb); }; });
  },
  paintHighlights(){
    const g=document.getElementById("grid"); if(!g||!this.armed) return;
    const cb=this.cur(); if(cb.side!=="pc") return;
    const a=this.armed;
    if(a.kind==="move"){
      const reach=this.reachable(cb,a.budget);
      Object.keys(reach).forEach(k=>{ if(k===this.key(cb.x,cb.y)) return;
        const [x,y]=k.split(",").map(Number);
        if(this.occupied(x,y)) return;
        const el=g.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`); if(el) el.classList.add("hl-move"); });
    } else if(a.kind==="target"){
      this.targets(a).forEach(t=>{
        const el=g.querySelector(`.token[data-cb="${t.id}"]`); if(el) el.classList.add("selected-targetable");
        const c=g.querySelector(`.cell[data-x="${t.x}"][data-y="${t.y}"]`); if(c) c.classList.add("hl-target");
      });
    } else if(a.kind==="cell"){ // AoE center pick
      for(let y=0;y<this.mapH;y++)for(let x=0;x<this.mapW;x++){
        if(this.walls.has(this.key(x,y))) continue;
        if(Math.max(Math.abs(x-cb.x),Math.abs(y-cb.y))<=a.range&&this.losClear(cb,{x,y})){
          const el=g.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`); if(el) el.classList.add("hl-aoe");
        }
      }
    }
  },
  targets(a){
    const cb=this.cur();
    const side=a.friendly? "pc":"foe";
    return this.cbs.filter(t=>t.side===side&&!t.dead&&(a.friendly||t.dying===0||true)
      &&this.dist(cb,t)<=a.range&&(a.range<=1||this.losClear(cb,t))
      &&(!a.friendly||t.dying===0||a.canDowned));
  },
  floatText(cb,txt,color){
    const g=document.getElementById("grid"); if(!g) return;
    const el=document.createElement("div"); el.className="float-txt"; el.textContent=txt;
    el.style.left=(cb.x*46+8)+"px"; el.style.top=(cb.y*46-6)+"px"; el.style.color=color;
    g.appendChild(el); setTimeout(()=>el.remove(),1100);
  },
  hint(t){ const el=document.getElementById("hint"); if(el) el.textContent=t||""; },

  /* ---------- player action bar ---------- */
  renderBar(){
    const bar=document.getElementById("action-bar"), pips=document.getElementById("action-pips"), st=document.getElementById("combat-status");
    if(!bar) return;
    pips.innerHTML=[0,1,2].map(i=>`<div class="pip ${i>=this.actions?"spent":""}"></div>`).join("");
    const cb=this.cur();
    st.innerHTML=`<b>${esc(cb.name)}</b> — HP ${cb.hp}/${cb.hpMax}${cb.tempHP?" (+"+cb.tempHP+" temp)":""}<br>
