<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renaissance Faire Management Sim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Renaissance Faire Manager</h1>
    <div id="top-bar">
      <span>Day: <strong id="ui-day">1</strong></span> | 
      <span>Gold: $<strong id="ui-gold">1000</strong></span> | 
      <span>Reputation: <strong id="ui-rep">50</strong>/100</span>
      <span>Version 0.1</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="office">Office</button>
    <button class="tab-btn" data-tab="backstage">Backstage</button>
    <button class="tab-btn" data-tab="floor">Fair Floor</button>
  </nav>

  <main>
    <!-- OFFICE VIEW -->
    <section id="view-office" class="view active">
      <h2>Office & Operations</h2>
      <div class="control-group">
        <label for="ticket-price">Ticket Price ($): </label>
        <input type="number" id="ticket-price" value="15" min="5" max="100">
      </div>
      <button id="btn-run-day" class="primary-btn">Run Today's Faire</button>
      <div id="day-report" class="report-box hidden"></div>
    </section>

    <!-- BACKSTAGE VIEW -->
    <section id="view-backstage" class="view">
      <h2>Backstage & Performers</h2>
      <div id="performer-roster"></div>
    </section>

    <!-- FAIR FLOOR VIEW -->
    <section id="view-floor" class="view">
      <h2>Fair Floor Map</h2>
      <div id="map-grid" class="grid-container"></div>
    </section>
  </main>

  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
